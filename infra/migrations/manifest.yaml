# infra/migrations/manifest.yaml
#
# Numbered SQL migration ledger.
# The replay engine reads this file; MigrationService applies pending entries
# against the live DB and records each ID in core._migrations.
#
# Rules:
#   - Only append to `order`. Never reorder or remove existing entries.
#   - New migration: add an SQL file under infra/scripts/migrations/ and
#     append its filename here.
#   - Python migration scripts (add_version_updated_at_to_autonomous_proposals.py,
#     migrate_cli_registry_v2.py) are manual; they are not replayed by this
#     ledger and are not listed here.
#   - Bootstrap an existing install that has all these applied manually:
#       core-admin db migrate --bootstrap
#     This seeds core._migrations without re-running any SQL.

migrations:
  directory: infra/scripts/migrations
  order:
