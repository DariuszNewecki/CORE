# .github/workflows/publish-pypi.yml
#
# F-48.2 — PyPI release workflow via Trusted Publisher (OIDC).
#
# Triggered on a semver-shaped tag push (v*.*.*). Builds the wheel + sdist
# and publishes `core-runtime` to PyPI with zero stored credentials —
# authentication is via OIDC token minted by GitHub Actions and verified
# by PyPI against a pre-registered trusted publisher configuration.
#
# See docs/release.md for the one-time setup (pending-publisher form and
# PyPI environment configuration). After setup, releases are:
#   1. Bump version in pyproject.toml
#   2. git tag vX.Y.Z && git push --tags
#   3. This workflow fires automatically.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish core-runtime to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/core-runtime
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          # Poetry >= 2.0 is required: pyproject.toml uses the PEP 621
          # [project] table, which Poetry 1.x (poetry-core 1.x) cannot build.
          # `poetry build` uses Poetry's vendored poetry-core, not the
          # build-system requires, so the CLI version is what matters here.
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(poetry version --short)
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PROJECT_VERSION}. Bump the version in pyproject.toml before tagging."
            exit 1
          fi
          echo "Tag matches: v${TAG_VERSION}"

      - name: Build wheel + sdist
        run: poetry build

      - name: Inspect built artifacts
        run: ls -la dist/

      - name: Wheel smoke test (bundled floor + CLI entry points)
        # Installs the built wheel into a clean venv and verifies:
        # 1. CLI entry points are wired correctly (core-admin --help runs).
        # 2. Bundled machinery floor is accessible from the installed package
        #    (the BYOR adoption path depends on this — ADR-108 D3 / #674).
        # Full write-path BYOR test (project onboard --write) requires a live
        # database and is covered by the core-ci.yml integration suite on main.
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/pip install --quiet dist/*.whl
          .smoke-venv/bin/core-admin --help > /dev/null
          cat > /tmp/smoke_floor.py << 'PYEOF'
          import importlib.resources as r, sys
          f = r.files("shared").joinpath("_machinery_floor")
          for d in ["META", "constitution", "taxonomies", "enforcement/config"]:
              if not (f / d).is_dir():
                  sys.exit(f"Bundled floor FAIL: {d} missing from installed package")
          print("Bundled floor OK — wheel BYOR path verified")
          PYEOF
          .smoke-venv/bin/python /tmp/smoke_floor.py

      - name: Publish to PyPI (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password` — Trusted Publisher uses the OIDC token
        # minted by GitHub Actions (id-token: write permission above).
        # PyPI verifies the token against the trusted publisher
        # configuration registered for `core-runtime`.
