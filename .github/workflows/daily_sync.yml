# .github/workflows/daily_sync.yml
# This workflow runs the daily constitutional audit for CORE.

name: "Daily Constitutional Audit"

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: "Constitutional Audit"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Install Poetry"
        uses: snok/install-poetry@v1
        with:
          # Must be installed BEFORE setup-python so its `cache: 'poetry'`
          # can locate Poetry; >= 2.0 for the PEP 621 [project] table.
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: "Install Dependencies"
        run: poetry install

      - name: "Run Constitutional Audit"
        run: |
          poetry run core-admin code audit --offline --format=github-annotations --severity=block
