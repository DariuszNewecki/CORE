# .github/workflows/daily_sync.yml
# This workflow runs the daily constitutional audit for CORE.

name: "Daily Constitutional Audit"

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: "Constitutional Audit"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Set up Python and Poetry"
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: "Install Dependencies"
        run: poetry install

      - name: "Run Constitutional Audit"
        run: |
          poetry run core-admin code audit --offline --format=github-annotations --severity=block
