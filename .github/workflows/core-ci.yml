# .github/workflows/core-ci.yml
name: CORE CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # #631 — fail when README's advertised governance counts drift from source.
  # Pure shell + jq (pre-installed on the runner); no Poetry/DB, runs in parallel.
  readme-counts:
    name: README count drift (#631)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Re-derive README quantitative claims from source
        run: bash scripts/check_readme_counts.sh

  # #726 — advisory check: multi-phase ADRs with open phases must have a
  # linked issue so they don't quietly stall. continue-on-error: true keeps
  # this advisory (visible in workflow run, never blocks merge).
  adr-phases:
    name: ADR phase tracking (#726)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check for untracked open ADR phases
        run: python scripts/check_adr_phases.py --specs-dir .specs/decisions

  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Hard bound: the integration suite must never hang the runner. If a test
    # blocks on an unprovisioned dependency, fail the job rather than wait.
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.12"]

    # ADR-115: the integration job runs against ephemeral, hermetic infrastructure
    # provisioned per run and seeded from the canonical schema — no dependency on a
    # hand-maintained LAN host.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: core_test_db
          POSTGRES_PASSWORD: core_test_db
          POSTGRES_DB: core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Cache Poetry & Pip
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      # ADR-115 D1: point the test config at the ephemeral localhost services.
      # The committed .env.test targets the LAN dev DB; rewrite only the runner's
      # copy. shared.config loads .env.test with override=True under pytest, so a
      # job-level env var would not win — the file itself must be rewritten.
      - name: Point test config at ephemeral services
        run: |
          sed -i \
            -e 's#@192\.168\.20\.23:5432#@localhost:5432#' \
            -e 's#http://192\.168\.20\.22:6333#http://localhost:6333#' \
            .env.test

      # ADR-115 D1: seed the ephemeral DB from the canonical schema-as-truth.
      # Roles (core_db, core) and extensions (the dump uses GIN/GIST over text
      # and an exclusion constraint) are prerequisites the dump assumes exist;
      # the pg_dump 17 \restrict/\unrestrict wrappers are stripped. Recipe proven
      # against postgres:17 locally: 0 errors, full schema.
      - name: Seed database from canonical schema
        env:
          PGPASSWORD: core_test_db
        run: |
          psql -h localhost -U core_test_db -d core_test -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE core_db;" \
            -c "CREATE ROLE core;" \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gin;" \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"
          sed '/^\\restrict/d; /^\\unrestrict/d' infra/sql/db_schema_live.sql \
            | psql -h localhost -U core_test_db -d core_test -v ON_ERROR_STOP=1

      - name: Vocabulary freshness check
        run: poetry run core-admin intent sync vocabulary --check

      # ADR-115 D3: lint statically (ruff), not via the core-api server.
      - name: Lint (ruff — static, no server)
        run: poetry run ruff check src tests

      - name: Upgrade pip in Poetry venv
        run: poetry run pip install --upgrade "pip>=26.1.2"

      - name: Dependency audit (pip-audit)
        run: poetry run pip-audit

      - name: Run tests with coverage (XML for Codecov)
        run: |
          poetry run pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=38

      - name: Upload coverage to Codecov
        if: github.repository == 'DariuszNewecki/CORE'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          name: core-ci-${{ matrix.python-version }}
          fail_ci_if_error: true
          verbose: true

  pr_linter:
    name: PR Linter
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check PR Body for Intent & Justification
        id: check_body
        # PR body is passed via env, never interpolated inline into the script:
        # an inline ${{ ... }} breaks on quotes/backticks/HTML in the body and is a
        # shell script-injection vector.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$PR_BODY" | grep -q "> REQUIRED:"; then
            echo "missing_justification=true" >> "$GITHUB_OUTPUT"
          else
            echo "missing_justification=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post Nudge Comment
        if: steps.check_body.outputs.missing_justification == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `
            #### 📝 Intent Required
            Thank you for the contribution!

            Please update the pull request description to include the **Intent & Justification** for this change. This is a constitutional requirement to ensure every change is traceable to a purpose.
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output
            });
