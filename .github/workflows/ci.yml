# .github/workflows/ci.yml
name: CI (Smoke)

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          # Poetry >= 2.0 required: pyproject.toml uses the PEP 621 [project]
          # table, which Poetry 1.x cannot read (poetry install would fail on
          # the now-metadata-less [tool.poetry] section).
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run tests (smoke)
        run: poetry run pytest -q
