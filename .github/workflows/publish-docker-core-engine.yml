# .github/workflows/publish-docker-core-engine.yml
#
# F-48.3 (#539) — publish the `core-engine` Solo+ runtime image to GHCR.
#
# Per ADR-086 D7, a `core-engine:X.Y.Z` image must exist if and only if
# `core-runtime X.Y.Z` exists on PyPI. The image installs the *published*
# wheel (ADR-086 D1), so it can only be built AFTER the PyPI publish for the
# same tag — enforced by the "wait for PyPI" guard below.
#
# Triggers:
#   - a semver tag push (v*.*.*), the same tag that fires publish-pypi.yml
#   - manual workflow_dispatch with a version input (to backfill an already
#     published release, e.g. 2.7.0)
#
# One-time manual step after the first publish: set the GHCR package
# visibility to Public (Packages → core-engine → Settings) so customers can
# pull without authenticating. The GITHUB_TOKEN cannot flip that flag.

name: Publish core-engine (Docker)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to (re)publish, e.g. 2.7.0 — must already be on PyPI"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build and publish core-engine to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version (tag or dispatch input)
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Wait for core-runtime==${{ steps.ver.outputs.version }} on PyPI (iff ordering)
        run: |
          V="${{ steps.ver.outputs.version }}"
          for i in $(seq 1 30); do
            if curl -fsS "https://pypi.org/pypi/core-runtime/${V}/json" >/dev/null 2>&1; then
              echo "core-runtime==${V} is on PyPI — proceeding."
              exit 0
            fi
            echo "[$i/30] core-runtime==${V} not on PyPI yet; waiting 20s..."
            sleep 20
          done
          echo "::error::core-runtime==${V} never appeared on PyPI — refusing to build core-engine (ADR-086 D7 iff invariant)."
          exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push core-engine
        uses: docker/build-push-action@v7
        with:
          context: .docker/core-engine
          file: .docker/core-engine/Dockerfile
          build-args: |
            CORE_RUNTIME_VERSION=${{ steps.ver.outputs.version }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/dariusznewecki/core-engine:${{ steps.ver.outputs.version }}
            ghcr.io/dariusznewecki/core-engine:latest

      - name: Summary
        run: |
          echo "### Published \`ghcr.io/dariusznewecki/core-engine:${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "(+ \`:latest\`) — ADR-086 D7 iff satisfied for this release." >> "$GITHUB_STEP_SUMMARY"
