# Global exclude for archived or environment files
exclude: "^(.archive/|.venv/|venv/|build/|dist/)"

repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Black formatter (manual stage only)
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        stages: [manual]
        files: \.pyi?$
        exclude: ^(scripts|dev-scripts)/

  # Ruff linter + formatter (Python files only)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-zero]
        files: \.pyi?$
        exclude: ^(scripts|dev-scripts)/
      - id: ruff-format
        files: \.pyi?$
        exclude: ^(scripts|dev-scripts)/

  # #438: SQL migrations must be registered in the policy `migrations.order`
  - repo: local
    hooks:
      - id: check-migrations-registered
        name: SQL migrations are registered in governance policy
        entry: python infra/scripts/check_migrations_registered.py
        language: system
        files: ^infra/scripts/migrations/.*\.sql$
        pass_filenames: true
