# grc-catalogs/inventory.yaml
#
# The GRC framework registry (ADR-116 D7). One public manifest declaring every
# framework CORE catalogs: its tier, the approved retrieval sources
# (whitelist-as-data — this governs every fetch), IP status, and authoring
# status. `tier` (public/licensed = the IP/access axis) is ORTHOGONAL
# to `ip_status` (the source's copyright): GDPR is a public-tier catalog built over
# an official-eu-law-reusable source.
#
# A `published` entry MUST have a matching catalog.yaml + provenance.yaml whose
# source agrees with the `sources` listed here (auditable; drift is a finding).
#
# status lifecycle: planned -> approved (sources governor-approved, no fetch yet)
#   -> authored (catalog written) -> published (live + provenance + tests).
# Approving an entry's `sources` authorizes fetching FROM THEM ONLY; it is not
# itself a fetch.
#
# `internal_use_licence` (ADR-116 D9, copyrighted frameworks only): the gate on
# CORE's INTERNAL audit corpus (grc-catalogs/internal/ — source full text +
# vectors CORE holds to reason against documents; ships to NO tier). Holding a
# copyrighted source's full text there needs a commercial/internal-use licence
# from the rightsholder; `required` means that licence is not yet held. ABSENT on
# public-domain / official-*-reusable frameworks, which may be ingested freely.
# Orthogonal to BOTH axes above: tier is who receives the shipped catalog,
# ip_status is reproduction in that catalog, internal_use_licence is what CORE may
# hold internally to compute. Ingesting copyrighted full text without a satisfied
# gate is a violation.

frameworks:
  - id: nist_800_171
    title: "NIST SP 800-171 Rev. 2"
    tier: public
    ip_status: public-domain
    fetch: full-text
    sources:
      - "https://csrc.nist.gov/pubs/sp/800/171/r2/final"
    revision: "Rev. 2 (February 2020)"
    status: published
    version: "0.1.0"

  - id: gdpr
    title: "Regulation (EU) 2016/679 — GDPR"
    tier: public
    ip_status: official-eu-law-reusable   # Decision 2011/833/EU
    fetch: full-text
    sources:
      - "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:02016R0679-20160504"
      - "https://eur-lex.europa.eu/eli/reg/2016/679/oj"
    revision: "consolidated 2016-05-04"
    status: authored        # catalog+provenance written (public/gdpr/); publish gated on live source verification (EUR-Lex unreachable at authoring; provenance.source_verified=false)
    version: null

  - id: cfr_part_11
    title: "21 CFR Part 11 — Electronic Records; Electronic Signatures"
    tier: public
    ip_status: public-domain   # U.S. Government work (Code of Federal Regulations)
    fetch: full-text
    sources:
      # eCFR is the primary official source but anti-bot-redirects automated
      # clients; govinfo.gov (GPO official CFR) is the equally-authoritative
      # source that served verification. Both governor-approved.
      - "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11"
      - "https://www.govinfo.gov/content/pkg/CFR-2024-title21-vol1/xml/CFR-2024-title21-vol1-part11.xml"
    revision: "2024 annual edition (revised as of April 1, 2024)"
    status: published       # verified against govinfo.gov; provenance.source_verified=true
    version: "0.1.0"

  - id: iso_27001
    title: "ISO/IEC 27001:2022 — Information security management systems — Requirements"
    tier: licensed
    ip_status: copyrighted   # ISO/IEC standard — text NOT reproduced; derive + cite clause/control IDs only
    fetch: metadata-only      # edition/title only; full text paywalled, never fetched/reproduced (iso.org also 403s automated clients)
    internal_use_licence: required   # gate (copyrighted only): holding full text in CORE's INTERNAL audit corpus needs a commercial/internal-use licence from the rightsholder — NOT yet held. Orthogonal to the shipped catalog (metadata-only) above.
    sources:
      - "https://www.iso.org/standard/27001"
    revision: "ISO/IEC 27001:2022 (third edition, 2022-10)"
    status: authored          # catalog+provenance written (licensed/iso_27001/); copyrighted source not auto-verifiable → source_verified=false; publish needs licensed-access title verification
    version: null

  - id: eu_annex_11
    title: "EudraLex Vol. 4 Annex 11 — Computerised Systems"
    tier: public
    ip_status: official-eu-reusable   # EU GMP guideline (European Commission); freely available & reusable
    fetch: full-text
    sources:
      - "https://health.ec.europa.eu/medicinal-products/eudralex/eudralex-volume-4_en"
      # the EC's own direct download of the Annex 11 PDF, verified against:
      - "https://health.ec.europa.eu/document/download/8d305550-dd22-4dad-8463-2ddb4a1345f1_en?filename=annex11_01-2011_en.pdf"
    revision: "revision 1 (effective 30 June 2011)"
    status: published         # verified against the official EC Annex 11 PDF; provenance.source_verified=true
    version: "0.1.0"

  - id: gamp5
    title: "ISPE GAMP 5 (2nd ed.) — A Risk-Based Approach to Compliant GxP Computerised Systems"
    tier: licensed
    ip_status: copyrighted    # ISPE guide — text NOT reproduced; derive + concept-level cite only
    fetch: metadata-only      # paywalled ISPE guide, never fetched/reproduced
    internal_use_licence: required   # gate (copyrighted only): holding full text in CORE's INTERNAL audit corpus needs a commercial/internal-use licence from ISPE — NOT yet held. Orthogonal to the shipped catalog (metadata-only) above.
    sources:
      - "https://ispe.org/publications/guidance-documents/gamp-5-guide-2nd-edition"
    revision: "GAMP 5 Second Edition (July 2022)"
    note: "Methodology guidance, not a control list → deliberately thin, advisor-mode, mostly-attested catalog. Companion to eu_annex_11 + cfr_part_11."
    status: authored          # derive+cite from published methodology; copyrighted+paywalled → source_verified=false; advisor-mode by design
    version: null

  - id: nis2
    title: "Directive (EU) 2022/2555 — NIS2 (high common level of cybersecurity across the Union)"
    tier: public
    ip_status: official-eu-law-reusable   # Decision 2011/833/EU — same posture as gdpr
    fetch: full-text
    sources:
      - "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32022L2555"
      - "https://eur-lex.europa.eu/eli/dir/2022/2555/oj"
    revision: "OJ L 333, 27.12.2022"
    note: "Directive (transposed via national law), not a regulation — catalog tracks the Union-level text. EUR-Lex is WebFetch-hostile (cf. gdpr): expect authoring to stall at source_verified=false pending human-paste verification. tier: public per ADR-116 updated tier boundary — EU law is freely accessible, its catalog is public."
    status: planned         # sources PROPOSED, not yet governor-approved → no fetch authorized
    version: null

  - id: cyfun
    title: "CCB CyberFundamentals Framework"
    tier: licensed
    ip_status: copyrighted    # CCB freely distributes the PDFs but states no reuse grant; atwork.safeonweb.be footer asserts "© All Rights Reserved" (checked 2026-06-20) — no confirmed permission to reproduce/redistribute control text. Treated as copyrighted; upgradeable to official-*-reusable if CCB licence is confirmed.
    fetch: metadata-only      # conservative pending explicit CCB licence: derive+cite control IDs, do NOT reproduce text (cf. iso_27001 / gamp5)
    internal_use_licence: required   # gate (copyrighted only): holding full text in CORE's INTERNAL audit corpus needs CCB reuse terms confirmed — NOT yet held. Orthogonal to the shipped catalog (metadata-only) above.
    sources:
      - "https://atwork.safeonweb.be/tools-resources/cyberfundamentals-framework"
      - "https://ccb.belgium.be"
    revision: "CyberFundamentals 2025 (launched Oct 2025); 2023 edition coexists until 2027-04-18"
    note: "Belgian CCB control framework mapped onto NIST CSF / ISO 27001 / IEC 62443 / CIS Controls / ETSI TR 103 305-1; four assurance levels (Small/Basic/Important/Essential). Source is NOT EUR-Lex → likely fetchable for verification once sources are approved. fetch/ip_status upgradeable to full-text if CCB reuse terms are confirmed."
    status: planned         # sources PROPOSED, not yet governor-approved → no fetch authorized
    version: null
