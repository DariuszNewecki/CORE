version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: core_qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /mnt/vector_db/core_qdrant_db:/qdrant/storage  # Bind to dedicated /mnt/vector_db disk, off root
    restart: always
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
