services:
  postgres:
    image: postgres:16
    container_name: core_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: core
    ports:
      - "5432:5432"
    volumes:
      - core_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d core"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: core_qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /mnt/vector_db/core_qdrant_db:/qdrant/storage  # Bind to dedicated /mnt/vector_db disk, off root
    restart: always
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  core_postgres_data:
