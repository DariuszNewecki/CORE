mappings:
  # Maps each rule in rules/starter.json to a deterministic check engine.
  # The engine + check_type decide HOW a rule is verified; the rule's own
  # `enforcement` field (in starter.json) decides whether a finding blocks.
  # All four engines below are LLM-free and need no database or network.
  #
  # Scopes use **/*.py (not src/**/*.py) so the starter fires on any repo
  # layout — flat, src/, package/, or mixed. Operators narrow scope during
  # ratification if needed.

  # 1. No silently-swallowed exceptions.  (blocking — demo rule)
  starter.no_bare_except:
    engine: regex_gate
    params:
      forbidden_patterns:
        - "except:\\s*pass"
        - "except Exception:\\s*pass"
        - "except BaseException:\\s*pass"
    scope:
      applies_to: ["**/*.py"]
      excludes: ["**/venv/**", "**/.venv/**", "**/build/**", "**/dist/**"]

  # 2. Public symbols have docstrings.  (reporting)
  starter.docstrings:
    engine: ast_gate
    params:
      check_type: docstrings_present
    scope:
      applies_to: ["**/*.py"]
      excludes: ["**/__init__.py", "tests/**/*.py", "test/**/*.py", "**/venv/**", "**/.venv/**"]

  # 3. No print() in importable code.  (reporting)
  starter.no_print:
    engine: ast_gate
    params:
      check_type: no_print_statements
    scope:
      applies_to: ["**/*.py"]
      excludes: ["tests/**/*.py", "test/**/*.py", "scripts/**/*.py", "**/venv/**", "**/.venv/**"]

  # 4. No hardcoded credentials.  (reporting)
  starter.no_secrets:
    engine: regex_gate
    params:
      forbidden_patterns:
        - "(?i)\\b(password|passwd|secret_key|api_key|access_token|auth_token)\\s*=\\s*['\"][^'\"\\s]{8,}['\"]"
    scope:
      applies_to: ["**/*.py"]
      excludes: ["tests/**/*.py", "test/**/*.py", "**/test_*.py", "**/*_test.py", "**/venv/**", "**/.venv/**"]
