# Production-Readiness Attestation Manifest
# Home (governor-confirmed 2026-07-22): .specs/attestations/production-readiness.yaml
# Companion to .specs/attestations/proof-index.yaml in the attestation namespace.
#
# Single machine-readable record of the CURRENT verdict + evidence for the fifteen
# production gates. Gate DEFINITIONS (requirement + acceptance criteria) live in
# .specs/requirements/URS-production-readiness.md; this manifest records STATE and points
# back per gate. The README "Production Readiness" table is GENERATED from this file.
#
# BINARY VERDICT vs GRANULAR STATUS:
#   The authoritative verdict is binary (URS §4): every gate not `met` counts as NOT MET,
#   and until all fifteen are met the overall verdict is "Production readiness: NOT ATTESTED".
#   `status` below is PROGRESS granularity only (a communication aid), never a claim that a
#   non-`met` gate is close.
#
# INVARIANT (validator + CI drift-check enforced, see `integrity` below):
#   status in {met, mostly_met}  REQUIRES  non-empty evidence[]  AND an attestation with
#   verified_by + verified_at. A status is a PROOF, not a declaration — the same
#   anti-vacuous-pass discipline G9 requires of the audit itself. Claude never signs an
#   attestation; a human does.

schema_version: 1
definition_source: .specs/requirements/URS-production-readiness.md
generates: README.md#production-readiness
overall_verdict: NOT ATTESTED           # derived: not all 15 gates met

# Closed status vocabulary (weakest -> strongest):
#   not_started       — no mechanism, no work begun
#   not_demonstrated  — mechanism exists but the proving run has never run
#   partial           — some acceptance sub-criteria met, others open
#   not_met           — a MANDATORY acceptance criterion is actively violated by an open
#                       blocker; the verdict is not-met regardless of other progress
#                       (distinct from partial = incremental progress, no invariant break)
#   mostly_met        — all but a narrow named residual met  (needs attestation)
#   met               — every acceptance criterion satisfied  (needs attestation)

