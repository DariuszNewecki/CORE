# .intent/enforcement/sanctuaries.yaml
#
# Sanctuary Registry
# Authority: ADR-137 D2
# Status: active
#
# PURPOSE:
#   Formal registry of production code sites that write files through mechanisms
#   the governance.mutation_surface.filehandler_required sensor cannot detect
#   (pathlib variable-receiver pattern, detection-inert per ast_gate taxonomy).
#
#   Each entry is a named, reviewed exception. The registry makes the sanctuary
#   population enumerable from .intent/ rather than requiring a grep of all
#   SANCTUARY comments in src/.
#
# ADDING AN ENTRY:
#   Requires: (a) structural evidence that FileHandler delegation is impossible,
#   (b) a closure_adr referencing this registry, and (c) a deadline or the
#   explicit token "open" if no closure path exists.
#   Code comments at the site MUST be shortened to reference this file.
#
# CLOSING AN ENTRY:
#   Delete the entry and the corresponding code comment when the structural
#   constraint is resolved. File a commit note referencing the closure.

sanctuaries:
  - id: action_logger_append
    site: src/shared/action_logger.py
    rule_id: governance.mutation_surface.filehandler_required
    detection_inert_pattern: "variable-receiver pathlib open — bare attr 'open' not caught by qualified-name matcher"
    rationale: >
      Append-mode write semantics. FileHandler has no append primitive; adding one
      would require routing action-log writes through ActionExecutor, which is the
      component being logged — a circular dependency that cannot be resolved without
      extracting a lower-level append surface from Body infrastructure.
    closure_adr: ADR-137
    deadline: open

  - id: coherence_seed_streaming_export
    site: src/cli/resources/coherence/seed.py
    rule_id: governance.mutation_surface.filehandler_required
    detection_inert_pattern: "variable-receiver pathlib open — bare attr 'open' not caught by qualified-name matcher"
    rationale: >
      Streaming JSONL export of paginated Qdrant results to a CLI-specified output
      path. FileHandler.write_runtime_text requires materializing the full collection
      in memory before writing; that is impractical for arbitrarily large Qdrant
      collections. The directory creation above the write is routed through
      FileHandler (governed); only the streaming write itself is the sanctuary site.
    closure_adr: ADR-137
    deadline: open
