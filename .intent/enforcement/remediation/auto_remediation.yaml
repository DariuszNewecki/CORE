      but no drainer is registered in
      .intent/enforcement/quarantine/drainer_registry.yaml — the
      invariant established by ADR-072 is violated. Resolution: either
      implement a drainer worker for the namespace (mirroring
      AuditViolationSensor's release-pass and TestRunnerSensor's D5
