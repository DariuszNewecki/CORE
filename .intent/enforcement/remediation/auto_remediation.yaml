# .intent/enforcement/remediation/auto_remediation.yaml
#
# Constitutional Remediation Map
# Authority: policy
# Phase: audit
# Status: active
#
# PURPOSE:
#   Maps audit check_ids to autonomous fix handlers.
#   Consumed by: body/autonomy/audit_analyzer.py (AuditAnalyzer)
#                will/workers/violation_remediator.py (ViolationRemediatorWorker)
#
# CONFIDENCE TIERS:
#   >= 0.90  → safe_only mode (deterministic, zero reasoning required)
#   >= 0.70  → medium_risk mode (deterministic with light validation)
#   >= 0.50  → all_deterministic mode (requires handler to be confirmed working)
#   < 0.50   → NOT dispatched; handler stub must be implemented first
#
# RISK LEVELS:
#   low    → single-file, deterministic, fully reversible
#   medium → multi-step, deterministic but affects logic flow
#   high   → structural changes, requires LLM or A3 loop
#
# HANDLER STATUS KEY:
#   ACTIVE   → action confirmed in atomic action registry
#   DELEGATE → non-automatable; ViolationRemediatorWorker routes to governor
#              inbox as an indeterminate finding requiring human decision.
#              Confidence set below MIN_CONFIDENCE (0.80); included in the
#              active map so ViolationExecutorWorker cannot claim it as unmapped.
#   PENDING  → action does not yet exist in registry; confidence set below
#              MIN_CONFIDENCE (0.80) to prevent dispatch until implemented.
#              Excluded from the active map entirely (loader skips PENDING).
#
# NOTE ON MIN_CONFIDENCE:
#   ViolationRemediatorWorker uses this map directly.
#   Only entries >= 0.80 will produce proposals.
#   DELEGATE entries are routed to the governor inbox, not proposals.
#   PENDING entries are documented for roadmap visibility only.
#
# FLOW ENTRIES:
#   Entries may use 'flow' instead of 'action' to dispatch through FlowExecutor.
#   Flow-based proposals always have approval_required=True (compute_risk()
#   classifies flows as "moderate"). Human approval is required before execution.
#
# ACTION IDs MUST match exactly what is registered in body/atomic/.
# Registered actions (as of 2026-04-05):
#   fix.atomic_actions, fix.docstrings, fix.duplicate_ids, fix.format,
#   fix.headers, fix.ids, fix.imports, fix.logging, fix.modularity,
#   fix.placeholders
#
# FLOW IDs MUST match exactly what is registered in body/flows/registry.
# Registered flows (as of 2026-05-05):
#   flow.build_tests, flow.fix_code, flow.dev_sync, flow.sync_state

mappings:
  # ===========================================================================
  # TIER 1: ACTIVE — safe_only (confidence >= 0.90)
  # Deterministic, fully reversible, no reasoning required.
  # ===========================================================================

  style.import_order:
    action: fix.imports
    confidence: 0.92
    risk: low
    description: >
      Sort imports in a single file using ruff (isort-compatible).
    status: ACTIVE

  linkage.duplicate_ids:
    action: fix.duplicate_ids
    confidence: 0.90
    risk: low
    description: >
      Regenerate fresh UUIDs for any duplicate # ID: comment tags. Safe: only
      rewrites comment lines, never touches logic.
    status: ACTIVE

  purity.no_todo_placeholders:
    action: fix.placeholders
    confidence: 0.92
    risk: low
    description: >
      Replace forbidden placeholder strings (TODO, FIXME, TBD, etc.).
      Deterministic regex — no reasoning required.
    status: ACTIVE

  linkage.assign_ids:
    action: fix.ids
    confidence: 0.91
    risk: low
    description: >
      Insert # ID: UUID comment above public functions and methods that lack
      one. Pure AST, no LLM, fully deterministic.
    status: ACTIVE

  logic.logging.standard_only:
    action: fix.logging
    confidence: 0.92
    risk: low
    description: >
      Replace print() and console.print() with logger calls. Deterministic AST
      transformation, no reasoning required.
    status: ACTIVE

  architecture.channels.logic_no_terminal_rendering:
    action: fix.logging
    confidence: 0.90
    risk: low
    description: >
      Terminal rendering (Rich, print) in logic layer must be replaced with
      logger calls. Deterministic AST fix.
    status: ACTIVE

  purity.stable_id_anchor:
    action: fix.ids
    confidence: 0.91
    risk: low
    description: >
      Insert missing stable ID anchors on public symbols.
    status: ACTIVE

  layout.src_module_header:
    action: fix.headers
    confidence: 0.91
    risk: low
    description: >
      Add or correct module header comments in src/ files.
    status: ACTIVE

  style.formatter_required:
    action: fix.format
    confidence: 0.92
    risk: low
    description: >
      Format file with ruff-format. Deterministic, fully reversible.
    status: ACTIVE

  workflow.ruff_format_check:
    action: fix.format
    confidence: 0.92
    risk: low
    description: >
      File would be reformatted by ruff format. Deterministic, fully reversible.
      Same handler as style.formatter_required — two rule IDs, one action.
    status: ACTIVE

  purity.docstrings.required:
    action: fix.docstrings
    confidence: 0.90
    risk: low
    description: >
      Add missing docstrings to public functions and classes.
    status: ACTIVE

  atomic_actions.must_return_action_result:
    action: fix.atomic_actions
    confidence: 0.90
    risk: low
    description: >
      Atomic actions missing ActionResult return type are fixed.
    status: ACTIVE

  # ===========================================================================
  # TIER 2: ACTIVE — high risk (confidence >= 0.85)
  # LLM-assisted structural changes. Logic Conservation Gate required.
  # Proposals created automatically. Human approval required before execution.
  # ===========================================================================

  modularity.needs_split:
    action: fix.modularity
    confidence: 0.85
    risk: high
    description: >
      Files exceeding line limit with single coherent responsibility are split
      using two-phase LLM analysis. Phase 1 (Architect, modularity_analyze) finds
      the seam. Phase 2 (Architect, modularity_split) executes. Logic Conservation
      Gate validates before any write. Defers automatically on low/medium confidence.
    status: ACTIVE

  ai.cognitive_role.no_hardcoded_string:
    action: remediate.cognitive_role
    confidence: 0.85
    risk: high
    description: >
      Hardcoded cognitive role string replaced with a governed constant from
      the cognitive_roles registry. LLM-assisted rewrite via CoderAgent.
      Human approval required before execution. See #133.
    status: ACTIVE

  # ===========================================================================
  # TIER 2b: ACTIVE — flow-based (confidence >= 0.85)
  # Dispatched via FlowExecutor. Proposals require human approval before
  # execution (compute_risk() classifies flows as "moderate" universally).
  # ===========================================================================

  test.missing:
    flow: flow.build_tests
    confidence: 0.85
    risk: high
    description: >
      Source file has no corresponding test file. Dispatches flow.build_tests
      which runs: build.tests (CoderAgent generates test), then fix.imports,
      fix.headers, fix.format as optional auto-heal steps. Human approval
      required before execution.
    status: ACTIVE

  test.failure:
    flow: flow.build_tests
    confidence: 0.85
    risk: high
    description: >
      Existing test file has failures. Dispatches flow.build_tests to regenerate
      the test file, then apply fix.imports, fix.headers, fix.format as optional
      auto-heal steps. Human approval required before execution.
    status: ACTIVE

  # ===========================================================================
  # TIER 3a: DELEGATE — human routing required
  # Non-automatable violations. ViolationRemediatorWorker routes these to the
  # governor inbox as indeterminate findings. Confidence below MIN_CONFIDENCE
  # (0.80) to prevent proposal dispatch. Included in active map so
  # ViolationExecutorWorker cannot claim them as unmapped (ADR-029).
  # ===========================================================================

  modularity.class_too_large:
    action: fix.modularity
    confidence: 0.40
    risk: high
    description: >
      Class-level refactors require human architectural decision —
      non-automatable per ADR-007. Routed to governor inbox as DELEGATE.
      Explicitly mapped to prevent ViolationExecutorWorker from claiming
      these findings as unmapped. Human review required before any action.
    status: DELEGATE

  architecture.channels.logger_not_presentation:
    action: fix.logging
    confidence: 0.40
    risk: moderate
    description: >
      Logger used for presentation output — Rich objects or strings
      containing Rich markup passed to logger.* calls. Correct
      remediation is the inverse direction of fix.logging: convert
      logger.* back to console.print where the content carries Rich
      content. No automatable fixer exists; manual migration is the
      only safe path (precedent: #371's 8-batch hand migration of 113
      sites across src/cli/). Routed to governor inbox as DELEGATE.
      Confidence below MIN_CONFIDENCE (0.80) prevents dispatch.
      Explicitly mapped — not unmapped — to halt the abandoned-finding
      re-emission loop that previously occurred when the rule had no
      entry at all (peak: 1,558 abandoned findings in 48h from two
      files before #343/#344 deletion).
    status: DELEGATE

  # ===========================================================================
  # TIER 3b: PENDING — action implementation required
  # Documented for roadmap visibility only. Will not be dispatched.
  # Excluded from the active map at loader time (loader skips PENDING).
  # ===========================================================================

  modularity.needs_refactor:
    action: fix.modularity
    confidence: 0.40
    risk: high
    description: >
      PENDING: Mixed-discipline files require human architectural decision
      before any autonomous action. Blocking rule — human review required.
    status: PENDING

  architecture.path_access.no_hardcoded_runtime_dirs:
    action: fix.path_resolver
    confidence: 0.85
    risk: high
    description: >
      Hardcoded runtime directory name in path construction. Route through
      PathResolver or FileHandler. Deterministic AST rewrite — each site
      replaces a string literal with a PathResolver property access. Human
      approval required before execution. See ADR-031, #272.
    status: ACTIVE

  architecture.constitution_read_only:
    action: fix.layer_violation
    confidence: 0.40
    risk: high
    description: >
      PENDING: Structural refactor requiring human review.
    status: PENDING

  code.imports.no_stale_namespace:
    action: fix.imports
    confidence: 0.55
    risk: high
    description: >
      PENDING: Dangerous without full import graph resolver.
    status: PENDING

  architecture.mind.no_body_invocation:
    action: fix.layer_violation
    confidence: 0.40
    risk: high
    description: >
      PENDING: Structural refactor requiring human review.
    status: PENDING

  governance.mutation_surface.filehandler_required:
    action: fix.layer_violation
    confidence: 0.40
    risk: high
    description: >
      PENDING: AST rewrite requiring context on surrounding logic.
    status: PENDING
