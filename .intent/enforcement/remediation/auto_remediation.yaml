      namespace should be removed. Non-automatable; requires governor
      architectural decision.
    status: DELEGATE

  coherence.violation_executor.blast_bound:
    action: fix.modularity
    confidence: 0.40
    description: >
      2026-05-24 hardening sweep Session 2 / blast-bound principle.
      ViolationExecutorWorker reached its per-cycle files-rewritten cap
      (declared in .intent/workers/violation_executor.yaml
      mandate.schedule.files_per_cycle_max). The excess findings have
      been released back to `open` for the next cycle — work is paced,
      not lost. The OPEN finding under this rule is the audit-trail
      record that the rate limit fired; no autonomous proposal is
      dispatched. Operator action: amend the cap if too low,
      investigate upstream cause if sensor is over-emitting, or accept
      the pacing as intended. Cognate with coherence.repo_artifacts.drift
      (ADR-070 D8 writer-as-sensor OPEN-finding pattern).
    status: DELEGATE

  coherence.repo_artifacts.drift:
    action: fix.modularity
    confidence: 0.40
    description: >
      ADR-070 D8 writer-as-sensor: orphan rows in core.repo_artifacts
      (rows whose file_path no longer exists on disk) are detected
      every RepoCrawlerWorker cycle. Two emission paths share this
      rule; the finding's `status` and `payload.drift_class`
      discriminate. (1) `status=resolved` / `drift_class=reaped_inline`:
      the drift was within the safety bounds and reaped INLINE in the
      same cycle (ADR-070 D4 writer-as-sensor + inline remediation);
      finding is audit-trail attribution only. (2) `status=open` /
      `drift_class=excessive_or_partial_walk`: a safety guard tripped
      (proposed reap above hard/fraction cap, or walker enumerated
      suspiciously few files); the reap was SKIPPED pending governor
      inspection of `payload.sample_paths`. Either way no proposal is
      dispatched — the writer is constitutionally permitted to mutate
