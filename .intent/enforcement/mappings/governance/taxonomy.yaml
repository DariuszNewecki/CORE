# .intent/enforcement/mappings/governance/taxonomy.yaml
#
# Enforcement mappings for the operational-capability taxonomy invariants
# and the ADR-091 D2 Revision B resolver-ownership invariant.
# Based on: .intent/rules/governance/taxonomy.json

mappings:
  # Rule: governance.taxonomy.operational_capabilities_decorator_backing
  # Engine: taxonomy_gate (context-level; cross-artifact YAML vs AST sweep)
  #
  # scope.applies_to per #158: every mapping must declare an explicit
  # surface so a typo or omission produces an empty-match warning at
  # extraction time rather than silently widening to all of src/. For
  # this context-level check the substrate IS the YAML; the engine's
  # verify_context loads it directly and AST-walks src/ independently.
  # applies_to is referenced here only to satisfy the gate — the check
  # fires once per audit cycle regardless of file_filter intersection.
  # Mirrors the cognate pattern in governance/namespace.yaml.
  #
  # Promotion path: stage 1 ships at `reporting`. Stage 2 (per ADR-079 D10)
  # promotes to `blocking` together with the phantom-resolution change-set.
  governance.taxonomy.operational_capabilities_decorator_backing:
    engine: taxonomy_gate
    params:
      check_type: operational_capabilities_decorator_backing
    scope:
      applies_to:
        - ".intent/taxonomies/operational_capabilities.yaml"

  # Rule: governance.taxonomy.self_resolve_resolver_owned
  # Engine: taxonomy_gate (context-level; cross-artifact src/ call sites vs
  #         docstrings vs tests/ references)
  #
  # ADR-091 D2 Revision B (d). The resolver-ownership invariant: every
  # subject prefix appearing on post_finding(..., resolution_mechanism=
  # 'self_resolve') in src/ must be backed by a documented resolver path
  # (the canonical "ADR-091 D2 Revision B resolution classification:"
  # block in the emitter's module docstring) AND a test referencing the
  # subject prefix. The engine walks src/ for call sites, traces each
  # subject= kwarg back to its module-level prefix constant, then
  # verifies the docstring block + test reference per prefix. Test signal
  # is generous (any test file mentioning the prefix as a string) per
  # Revision B (h)'s scope-decision tolerance — posting-only tests like
  # tests/will/workers/test_resolution_mechanism_classification.py count.
  #
  # scope.applies_to declares both surfaces the check walks. The context-
  # level dispatch fires once per audit cycle regardless of file-filter
  # intersection; the entries here exist so a change to either surface
  # re-triggers the check.
  #
  # Promotion path: ships at `reporting`; promotes to `blocking` after one
  # clean audit cycle confirms zero violations on the five surviving sites
  # (worker.silent, blackboard.entry_stale, proposal.{stuck_approved,
  # stuck_executing, repeated_failure}). Issue #575 step (4).
  governance.taxonomy.self_resolve_resolver_owned:
    engine: taxonomy_gate
    params:
      check_type: self_resolve_resolver_owned
    scope:
      applies_to:
        - "src/**/*.py"
        - "tests/**/*.py"
