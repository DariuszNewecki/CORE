# .intent/enforcement/mappings/governance/finalization_integrity.yaml
# Constitutional enforcement for Proposal Finalization Integrity
# Version: 1.1.0
# Authority: policy
#
# WHAT THIS ENFORCES:
#   Rules from .intent/rules/governance/proposal_finalization_integrity.json
#   Rules from .intent/rules/governance/consequence_evidence_degraded.json
#
# THE LAW: A proposal in status='completed' MUST have a durable consequence
# record (consequence_recorded_at IS NOT NULL). Detected by
# CommitAuthorshipAuditWorker's finalization-integrity audit (ADR-148 D5);
# findings posted directly to the blackboard as
# governance.proposal_finalization_integrity::{proposal_id}.
#
# A completed proposal whose consequence row exists but was synthesized by
# the ADR-148 D4 stuck_finalizing roll-forward (consequence_source =
# 'reaper_reconstructed') passes the check above (the row is present) but
# carries fabricated, empty evidence. ADR-148 D7 (#790) adds a second,
# independent check for exactly this — findings posted as
# governance.consequence_evidence_degraded::{proposal_id}.
#
# NOTE: passive_gate is correct here — the worker is the detector, same
# shape as governance.commit_authorship_integrity (authorship_integrity.yaml),
# which this rule was extended alongside. This mapping satisfies
# governance.remediation.all_rules_mapped (ADR-066); static engine-level
# analysis does not apply to worker-driven runtime rules that audit live
# database state rather than source code.

mappings:
  # RULE: governance.proposal_finalization_integrity
  # Worker-based detection via CommitAuthorshipAuditWorker (ADR-148 D5).
  # The worker queries core.autonomous_proposals for completed rows missing
  # consequence_recorded_at (excluding pre-barrier rows) and posts findings
  # to the blackboard. passive_gate signals that the audit engine does not
  # duplicate the worker's runtime check.
  governance.proposal_finalization_integrity:
    engine: passive_gate
    params:
      attestation_class: "C"
    scope:
      applies_to:
        - "src/**/*.py"

  # RULE: governance.consequence_evidence_degraded
  # Worker-based detection via CommitAuthorshipAuditWorker (ADR-148 D7).
  # The worker queries core.proposal_consequences joined to
  # core.autonomous_proposals for completed rows whose consequence_source =
  # 'reaper_reconstructed', and posts findings to the blackboard. Same
  # passive_gate shape as its sibling rule above — the worker is the sole
  # detector; the audit engine does not duplicate it.
  governance.consequence_evidence_degraded:
    engine: passive_gate
    params:
      attestation_class: "C"
    scope:
      applies_to:
        - "src/**/*.py"
