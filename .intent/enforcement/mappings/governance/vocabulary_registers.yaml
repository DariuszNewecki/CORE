# .intent/enforcement/mappings/governance/vocabulary_registers.yaml
#
# Enforcement mapping for governance.vocabulary_registers rules.
# Declared under CORE-Vocabulary-Registers.md and Article I §5 of the
# Constitution. Both rules require structured YAML/JSON field parsing;
# python_runtime is the appropriate engine.
#
# No auto_remediation entries: register casing violations require
# intentional human correction of governance artifact authoring.

mappings:
  # RULE: governance.vocabulary_registers.operational_fields_must_be_lowercase
  # Verifies that values in operational-register fields of .intent/ artifacts
  # use lowercase_snake_case. Operational-register fields: authority, phase,
  # strength, enforcement, status, class, ordering.
  # A Title Case or UPPER_CASE value in any of these fields is a violation.
  governance.vocabulary_registers.operational_fields_must_be_lowercase:
    engine: python_runtime
    params:
      check_type: register_casing_validation
      register: operational
      fields:
        - authority
        - phase
        - strength
        - enforcement
        - status
        - class
        - ordering
      expected_pattern: "^[a-z][a-z0-9_]*$"
    scope:
      applies_to:
        - ".intent/**/*.yaml"
        - ".intent/**/*.json"
      excludes:
        - ".intent/META/**"
    severity: ERROR
    message: >
      An operational-register field contains a value in the wrong casing register.
      The fields authority, phase, strength, enforcement, status, class, and ordering
      must use lowercase_snake_case. Title Case and UPPER_CASE values import the
      wrong register and break case-sensitive loaders. Correct the authoring error
      in the affected .intent/ artifact.
      See: .intent/rules/governance/vocabulary_registers.json

  # RULE: governance.vocabulary_registers.diagnostic_fields_must_be_uppercase
  # Verifies that values in diagnostic-register fields of .intent/ artifacts
  # use UPPER_SNAKE_CASE. Diagnostic-register fields: severity, verdict-state fields.
  # A lowercase value in any of these fields is a violation.
  governance.vocabulary_registers.diagnostic_fields_must_be_uppercase:
    engine: python_runtime
    params:
      check_type: register_casing_validation
      register: diagnostic
      fields:
        - severity
    expected_pattern: "^[A-Z][A-Z0-9_]*$"
    scope:
      applies_to:
        - ".intent/**/*.yaml"
        - ".intent/**/*.json"
      excludes:
        - ".intent/META/**"
    severity: ERROR
    message: >
      A diagnostic-register field contains a value in the wrong casing register.
      The fields severity and verdict-state fields must use UPPER_SNAKE_CASE.
      A lowercase severity value cannot be matched against AuditSeverity enum
      members without a transformation that itself becomes a drift surface.
      Correct the authoring error in the affected .intent/ artifact.
      See: .intent/rules/governance/vocabulary_registers.json
