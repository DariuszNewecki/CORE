# .intent/enforcement/mappings/remediation/auto_remediation.yaml
#
# Constitutional Remediation Map
# Authority: policy
# Phase: audit
# Status: active
#
# PURPOSE:
#   Maps audit check_ids to autonomous fix handlers.
#   Consumed by: body/autonomy/audit_analyzer.py (AuditAnalyzer)
#                will/workers/violation_remediator.py (ViolationRemediatorWorker)
#
# CONFIDENCE TIERS:
#   >= 0.90  → safe_only mode (deterministic, zero reasoning required)
#   >= 0.70  → medium_risk mode (deterministic with light validation)
#   >= 0.50  → all_deterministic mode (requires handler to be confirmed working)
#   < 0.50   → NOT dispatched; handler stub must be implemented first
#
# RISK LEVELS:
#   low    → single-file, deterministic, fully reversible
#   medium → multi-step, deterministic but affects logic flow
#   high   → structural changes, requires LLM or A3 loop
#
# HANDLER STATUS KEY:
#   ACTIVE   → action confirmed in atomic action registry
#   PENDING  → action does not yet exist in registry; confidence set below
#              MIN_CONFIDENCE (0.80) to prevent dispatch until implemented
#
# NOTE ON MIN_CONFIDENCE:
#   ViolationRemediatorWorker uses this map directly.
#   Only entries >= 0.80 will produce proposals.
#   PENDING entries are documented here for roadmap visibility only.
#
# ACTION IDs MUST match exactly what is registered in body/atomic/.
# Registered actions (as of 2026-04-02):
#   fix.atomic_actions, fix.docstrings, fix.duplicate_ids, fix.format,
#   fix.headers, fix.ids, fix.imports, fix.logging, fix.placeholders

mappings:
  # ===========================================================================
  # TIER 1: ACTIVE — safe_only (confidence >= 0.90)
  # Deterministic, fully reversible, no reasoning required.
  # ===========================================================================

  style.import_order:
    action: fix.imports
    confidence: 0.92
    risk: low
    description: >
      Sort imports in a single file using ruff (isort-compatible).
    status: ACTIVE

  linkage.duplicate_ids:
    action: fix.duplicate_ids
    confidence: 0.90
    risk: low
    description: >
      Regenerate fresh UUIDs for any duplicate # ID: comment tags.
      Safe: only rewrites comment lines, never touches logic.
    status: ACTIVE

  purity.forbidden_placeholders:
    action: fix.placeholders
    confidence: 0.92
    risk: low
    description: >
      Replace forbidden placeholder strings (TODO, FIXME, TBD, etc.).
      Deterministic regex — no reasoning required.
    status: ACTIVE

  linkage.assign_ids:
    action: fix.ids
    confidence: 0.91
    risk: low
    description: >
      Insert # ID: UUID comment above public functions and methods that lack one.
      Pure AST, no LLM, fully deterministic.
    status: ACTIVE

  logic.logging.standard_only:
    action: fix.logging
    confidence: 0.92
    risk: low
    description: >
      Replace print() and console.print() with logger calls.
      Deterministic AST transformation, no reasoning required.
    status: ACTIVE

  architecture.channels.logger_not_presentation:
    action: fix.logging
    confidence: 0.90
    risk: low
    description: >
      Logger calls used for presentation output must be replaced with
      console.print(). Deterministic AST fix.
    status: ACTIVE

  architecture.channels.logic_no_terminal_rendering:
    action: fix.logging
    confidence: 0.90
    risk: low
    description: >
      Terminal rendering (Rich, print) in logic layer must be replaced
      with logger calls. Deterministic AST fix.
    status: ACTIVE

  purity.stable_id_anchor:
    action: fix.ids
    confidence: 0.91
    risk: low
    description: >
      Insert missing stable ID anchors on public symbols.
    status: ACTIVE

  layout.src_module_header:
    action: fix.headers
    confidence: 0.91
    risk: low
    description: >
      Add or correct module header comments in src/ files.
    status: ACTIVE

  style.formatter_required:
    action: fix.format
    confidence: 0.92
    risk: low
    description: >
      Format file with black. Deterministic, fully reversible.
    status: ACTIVE

  purity.docstrings.required:
    action: fix.docstrings
    confidence: 0.90
    risk: low
    description: >
      Add missing docstrings to public functions and classes.
    status: ACTIVE

  architecture.atomic_actions.must_return_action_result:
    action: fix.atomic_actions
    confidence: 0.90
    risk: low
    description: >
      Atomic actions missing ActionResult return type are fixed.
    status: ACTIVE

  # ===========================================================================
  # TIER 3: PENDING — action implementation required
  # Documented for roadmap visibility only. Will not be dispatched.
  # ===========================================================================

  architecture.max_file_size:
    action: fix.modularity
    confidence: 0.50
    risk: high
    description: >
      Files exceeding 400 lines need splitting.
      PENDING: fix.modularity action not yet registered in atomic registry.
      Implement ModularityRemediationService as atomic action first.
    status: PENDING

  modularity.refactor_score_threshold:
    action: fix.modularity
    confidence: 0.50
    risk: high
    description: >
      PENDING: Same as architecture.max_file_size.
    status: PENDING

  modularity.single_responsibility:
    action: fix.modularity
    confidence: 0.50
    risk: high
    description: >
      PENDING: fix.modularity action not yet registered.
    status: PENDING

  modularity.import_coupling:
    action: fix.modularity
    confidence: 0.50
    risk: high
    description: >
      PENDING: fix.modularity action not yet registered.
    status: PENDING

  modularity.semantic_cohesion:
    action: fix.modularity
    confidence: 0.50
    risk: high
    description: >
      PENDING: fix.modularity action not yet registered.
    status: PENDING

  architecture.constitution_read_only:
    action: fix.layer_violation
    confidence: 0.40
    risk: high
    description: >
      PENDING: Structural refactor requiring human review.
    status: PENDING

  code.imports.no_stale_namespace:
    action: fix.imports
    confidence: 0.55
    risk: high
    description: >
      PENDING: Dangerous without full import graph resolver.
    status: PENDING

  architecture.mind.no_body_invocation:
    action: fix.layer_violation
    confidence: 0.40
    risk: high
    description: >
      PENDING: Structural refactor requiring human review.
    status: PENDING

  governance.mutation_surface.filehandler_required:
    action: fix.layer_violation
    confidence: 0.40
    risk: high
    description: >
      PENDING: AST rewrite requiring context on surrounding logic.
    status: PENDING
