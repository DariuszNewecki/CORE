# .intent/enforcement/mappings/architecture/blackboard.yaml
# Enforcement mappings for Blackboard Attribution and Resolution-Authority
# invariants.
# Rule document: .intent/rules/architecture/blackboard.json
# Codifies: ADR-011 (Workers own blackboard attribution) +
#           ADR-091 D2 Revision B (reaudit guard)

mappings:

  architecture.blackboard.worker_only_inserts:
    engine: regex_gate
    params:
      forbidden_patterns:
        # Case-insensitive via inline (?i) flag — SQL is case-insensitive by
        # convention and the codebase mixes "INSERT INTO" / "insert into"
        # against the same table. \s+ covers any whitespace between tokens
        # (including newlines inside multi-line SQL strings). (?:core\.)?
        # allows both schema-qualified and bare forms; the table is
        # authoritatively in schema `core` but we match either to catch
        # drift.
        - "(?i)INSERT\\s+INTO\\s+(?:core\\.)?blackboard_entries"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        # The single legitimate INSERT site: Worker base class's _post_entry
        # method. This is the canonical attribution-preserving path; every
        # post_finding / post_report / post_heartbeat call in Worker
        # subclasses routes here.
        - "src/shared/workers/base.py"
        # Standard exclusions matching the conventions of other mapping files.
        - "tests/**/*.py"
        - "**/__init__.py"

  # Rule: architecture.blackboard.reaudit_requires_reaudit_mechanism
  # Engine: ast_gate (per-file AST scan over sqlalchemy.text(...) string
  #         literals)
  #
  # ADR-091 D2 Revision B (b). Every UPDATE on core.blackboard_entries
  # that transitions a row to status='awaiting_reaudit' MUST co-occur
  # with `resolution_mechanism = 'reaudit'` in the same WHERE clause.
  # The check walks ast.Call nodes for text(...) invocations and flags
  # any string-literal argument containing the awaiting_reaudit
  # transition pattern without the guard predicate.
  #
  # Promotion path: ships at `reporting`; promotes to `blocking` after
  # one clean audit cycle confirms zero violations. Issue #575 step (4).
  # Expected violations at engine landing: zero — the only current
  # awaiting_reaudit write site (revive_findings_for_failed_proposal at
  # src/body/services/blackboard_service/blackboard_proposal_service.py)
  # already carries the guard from commit 1c (b2887afe).
  architecture.blackboard.reaudit_requires_reaudit_mechanism:
    engine: ast_gate
    params:
      check_type: reaudit_requires_reaudit_mechanism
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"
        - "**/__init__.py"

  # Rule: architecture.blackboard.indeterminate_requires_human_mechanism
  # Engine: ast_gate (per-file AST scan over sqlalchemy.text(...) string
  #         literals)
  #
  # ADR-091 D2 Amendment (2026-06-12, #628). The symmetric twin of the
  # reaudit guard above: every UPDATE on core.blackboard_entries whose SET
  # clause transitions a row to status='indeterminate' MUST co-assign
  # `resolution_mechanism = 'human'`. Detection is scoped to the SET body
  # (WHERE-clause status='indeterminate' filters are not flagged) and, unlike
  # the reaudit guard's literal-only match, fires on both the literal and the
  # parameterised (:status) forms because indeterminate is written both ways.
  #
  # Promotion path: ships at `reporting`; promotes to `blocking` after one
  # clean audit cycle confirms zero violations and the #628 fix-D backfill
  # clears the pre-existing indeterminate+reaudit rows. Expected violations at
  # engine landing: zero — the four write sites (mark_indeterminate,
  # update_entry_status, CallSiteRewriter._mark_findings, PromptArtifactWriter)
  # all carry the human co-assignment from this change-set.
  architecture.blackboard.indeterminate_requires_human_mechanism:
    engine: ast_gate
    params:
      check_type: indeterminate_requires_human_mechanism
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"
        - "**/__init__.py"
