# .intent/enforcement/mappings/architecture/async_logic.yaml
mappings:
  # RETIRED: logic.di.no_global_session — superseded by
  # architecture.boundary.database_session_access (issue #512, direction 2).
  # Mapping entry removed; rule retained in async_logic.json as advisory
  # historical record. src/features/ (original scope) no longer exists;
  # src/body/services/ scope is covered by the constitutional rule.

  # LAW: Logic modules MUST NOT hijack the event loop
  #
  # EXCLUSIONS RATIONALE (Mind-Body-Will Architecture):
  # - CLI entry points MUST call asyncio.run() to bootstrap async runtime
  # - CLI helper utilities provide @async_command decorator (legitimate use)
  # - Internal logic/engines/tools MUST NOT call asyncio.run() (they run INSIDE the runtime)
  async.no_manual_loop_run:
    engine: ast_gate
    params:
      check_type: restrict_event_loop_creation
      forbidden_calls: ["asyncio.run", "asyncio.get_event_loop"]
    scope:
      applies_to: ["src/**/*.py"]
      excludes:
        # CLI Entry Points - Bootstrap async runtime
        - "src/cli/cli_user.py"
        # CLI Helpers - Provide @async_command decorator
        - "src/cli/utils/**"
        # Maintenance Scripts - Standalone entry points
        - "src/body/maintenance/scripts/**"
        # Tests
        - "tests/**"

  # LAW: Operational logs MUST use standard getLogger
  logic.logging.standard_only:
    engine: ast_gate
    params:
      check_type: no_print_statements
    scope:
      applies_to: ["src/**/*.py"]
      excludes: ["src/api/**", "tests/**"]
