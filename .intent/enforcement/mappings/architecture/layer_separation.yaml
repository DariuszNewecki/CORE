# .intent/enforcement/mappings/architecture/layer_separation.yaml
#
# Enforces the constitutional Mind/Body/Will architectural separation.
# Based on: .intent/papers/CORE-Mind-Body-Will-Separation.md

mappings:
  # ==========================================================================
  # RULE 0: Perimeter — No shadow layers outside Mind/Body/Will/shared/api
  # Moved from core_safety.yaml — rule definition lives in layer_separation.json
  # ==========================================================================

  architecture.layer_exclusivity:
    engine: glob_gate
    params:
      check_type: allowed_top_level_dirs
      allowed:
        - "src/mind/**"
        - "src/body/**"
        - "src/will/**"
        - "src/shared/**"
        - "src/api/**"
        - "src/cli/**"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/__init__.py"

  # ==========================================================================
  # RULE 1: Mind Never Executes - Database Access
  # ==========================================================================

  architecture.mind.no_database_access:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "shared.infrastructure.database.session_manager.get_session"
        - "shared.infrastructure.database.get_session"
        - "shared.infrastructure.database.session_manager.get_db_session"
        - "shared.infrastructure.database.get_db_session"
    scope:
      applies_to:
        - "src/mind/**/*.py"

  # ==========================================================================
  # RULE 2: Mind Never Executes - Filesystem Writes
  # ==========================================================================

  architecture.mind.no_filesystem_writes:
    engine: ast_gate
    params:
      check_type: no_direct_writes
    scope:
      applies_to:
        - "src/mind/**/*.py"
      excludes:
        - "src/mind/**/*_test.py"

  # ==========================================================================
  # RULE 3: Mind Never Invokes Body
  # ==========================================================================

  architecture.mind.no_body_invocation:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "src.body"
        - "body"
    scope:
      applies_to:
        - "src/mind/**/*.py"

  # ==========================================================================
  # RULE 4: Mind Never Invokes Will
  # ==========================================================================

  architecture.mind.no_will_invocation:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "src.will"
        - "will"
    scope:
      applies_to:
        - "src/mind/**/*.py"

  # ==========================================================================
  # RULE 5: Body Never Evaluates Rules
  # ==========================================================================

  architecture.body.no_rule_evaluation:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "src.mind.logic.engines"
        - "mind.logic.engines"
    scope:
      applies_to:
        - "src/body/**/*.py"
      excludes:
        # Body orchestration services may coordinate rule evaluation
        - "src/body/orchestration/**/*.py"
        # Body governance execution layer (IntentGuard infrastructure)
        # dispatches engines at enforcement time — same role as orchestration
        - "src/body/governance/*.py"
        - "src/body/governance/**/*.py"
        # Atomic action proof mechanism: verify_metadata_only_diff proves
        # a write is metadata-only before allowing it — uses Mind utility
        # as a validation primitive, not for governance rule evaluation
        - "src/body/atomic/metadata_ops.py"
        # Assisted action lane uses EngineRegistry as a validation primitive
        # (same role as metadata_ops.py); proper DI path tracked as architecture debt
        - "src/body/atomic/assisted_actions.py"
        # GRC gap analysis service uses EngineRegistry + GRCApplicabilityGate for
        # document-corpus rule evaluation; DI refactor deferred pending ADR-049 tightening
        - "src/body/services/grc/gap_analysis_service.py"
        # CLI reporting tools: use Mind checks for display only,
        # no governance decisions made
        - "src/body/cli/commands/refactor_support/analyzer.py"
        - "src/body/cli/logic/governance/engine.py"

  # ==========================================================================
  # RULE 6: Will Never Accesses Database Directly
  # ==========================================================================

  architecture.will.no_direct_database_access:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "shared.infrastructure.database.session_manager.get_session"
        - "shared.infrastructure.database.session_manager.get_db_session"
    scope:
      applies_to:
        - "src/will/**/*.py"
      # REMOVED: src/will/workers/*.py exemption — no rationale was ever documented.
      # This exemption was silently hiding 14 production violations across Will workers
      # (external audit 2026-03-28, Finding 1.1 / Finding 1.6).
      # Will workers must use dependency injection like all other Will components.
      # Tracking: full remediation requires WillDatabasePort refactor (Finding 1.1).

      # RESOLVED (external-review verification, 2026-07-12): the former direct
      # write from proposal_executor.py to core.proposal_consequences was
      # extracted into ConsequenceLogService (src/body/services/consequence_log_service.py).
      # ProposalExecutor no longer writes raw SQL — it delegates via
      # proposal_execution_pipeline.record_consequence() ->
      # service_registry.get_consequence_log_service().record(). The
      # "consequence_log_body_extraction (pending)" tracking item is closed.

  # ==========================================================================
  # RULE 7: Will Delegates Filesystem Operations
  # ==========================================================================

  architecture.will.no_filesystem_operations:
    engine: ast_gate
    params:
      check_type: no_direct_writes
    scope:
      applies_to:
        - "src/will/**/*.py"
      excludes:
        - "src/will/**/*_test.py"

  # ==========================================================================
  # RULE 8: Will Delegates to Body (Advisory - uses knowledge_gate)
  # ==========================================================================

  architecture.will.must_delegate_to_body:
    engine: knowledge_gate
    params:
      check_type: component_responsibility
      expected_pattern: "Will orchestrates by delegating to Body services"
    scope:
      applies_to:
        - "src/will/agents/**/*.py"
        - "src/will/orchestration/**/*.py"

  # ==========================================================================
  # RULE 9: API Never Bypasses Layers - Database
  # SCOPE FIX 2026-04-19: Added "src/api/*.py" alongside "src/api/**/*.py".
  # ==========================================================================

  architecture.api.no_direct_database_access:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "shared.infrastructure.database.session_manager.get_session"
        - "shared.infrastructure.database.session_manager.get_db_session"
    scope:
      applies_to:
        - "src/api/**/*.py"
        - "src/api/*.py"
      excludes:
        # FastAPI dependency injection is acceptable
        - "src/api/**/dependencies.py"
        - "src/api/dependencies.py"

  # ==========================================================================
  # RULE 10: API Routes Through Will (Advisory - uses knowledge_gate)
  # ==========================================================================

  architecture.api.must_route_through_will:
    engine: knowledge_gate
    params:
      check_type: component_responsibility
      expected_pattern: "API routes requests to Will layer"
    scope:
      applies_to:
        - "src/api/**/*_routes.py"

  # ==========================================================================
  # RULE 11: API Doesn't Bypass to Body
  # EXTENDED 2026-04-19: Widened forbidden list from "body.services" only
  # to all of Body.
  # SCOPE FIX 2026-04-19: Added "src/api/*.py" alongside "src/api/**/*.py".
  # COMPOSITION-ROOT EXEMPTION 2026-04-19: Added src/api/main.py to excludes.
  # ==========================================================================

  architecture.api.no_body_bypass:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "src.body"
        - "body"
    scope:
      applies_to:
        - "src/api/**/*.py"
        - "src/api/*.py"
      excludes:
        # Composition-root sanctuary — api/main.py is the FastAPI entrypoint
        # where lifespan must be wired at app creation. core_lifespan lives
        # in Body because it coordinates Body services; api/main.py's import
        # of it is the single allowed cross-layer reference by design.
        - "src/api/main.py"
        # DI-root sanctuary — dependencies.py is the ADR-049 D1 §6 sanctioned
        # infrastructure site. decode_access_token is a DI root (get_current_user
        # dependency), not a business-logic bypass. auth_routes.py Body import
        # tracked for Will facade in #718.
        - "src/api/dependencies.py"

  # ==========================================================================
  # RULE 12: Body Never Invokes Will
  # EXTENDED 2026-03-28: Added will.workers and will.self_healing.
  # EXPANDED 2026-05-15 (ADR-049 D1): forbidden replaced 4 explicit sub-path
  # entries with bare prefixes `src.will` and `will`, covering every will.*
  # descendant via ast_gate Mode 2 prefix matching. This closes the gap
  # between paper §5.4 ("Body → Will constitutionally prohibited") and the
  # previously-narrow rule scope.
  # ==========================================================================

  architecture.layers.no_body_to_will:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "src.will"
        - "will"
    scope:
      applies_to:
        - "src/body/**/*.py"

  # ==========================================================================
  # RULE 13: Mind Never Executes (Advisory - uses knowledge_gate)
  # ==========================================================================

  architecture.layers.no_mind_execution:
    engine: knowledge_gate
    params:
      check_type: component_responsibility
      expected_pattern: "Mind defines law but never executes"
    scope:
      applies_to:
        - "src/mind/**/*.py"

  # ==========================================================================
  # RULE 14: Shared Never Makes Strategic Decisions (Advisory - knowledge_gate)
  # ==========================================================================

  architecture.shared.no_strategic_decisions:
    engine: knowledge_gate
    params:
      check_type: component_responsibility
      expected_pattern: "Shared provides utilities without strategic decisions"
    scope:
      applies_to:
        - "src/shared/**/*.py"
      excludes:
        - "src/shared/infrastructure/service_registry.py"

  # ==========================================================================
  # RULE 15: Shared Never Imports From Layers — Blocking AST Gate
  # Constitutional basis: CORE-Mind-Body-Will-Separation.md §7.2 Admission Test 1
  # ADDED 2026-03-28: Implements the shared/ admission test as enforceable law.
  # Replaces the previously advisory-only governance of src/shared/.
  # ==========================================================================

  architecture.shared.no_layer_imports:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "src.mind"
        - "mind"
        - "src.body"
        - "body"
        - "src.will"
        - "will"
    scope:
      applies_to:
        - "src/shared/**/*.py"
      excludes:
        # Tests
        - "src/shared/**/test_*.py"
        - "tests/**"

  # ==========================================================================
  # RULE 16: Workers Never Import Other Workers
  # Blocking AST gate — inter-worker communication via blackboard only.
  # Existing helper modules in will/workers/ are excluded pending extraction.
  # ==========================================================================

  architecture.workers.no_direct_worker_import:
    engine: ast_gate
    params:
      check_type: runtime_import_boundary
      forbidden:
        - "will.workers"
        - "body.workers"
      type_checking_exempt: true
    scope:
      applies_to:
        - "src/will/workers/**/*.py"
        - "src/body/workers/**/*.py"
      excludes:
        # Helper modules co-located in will/workers/ — not Worker subclasses.
        # These import utility functions (not Worker instances) from sibling
        # helper files. Pending extraction to will/ or shared/ (#723 follow-up).
        - "src/will/workers/proposal_consumer_worker.py"
        - "src/will/workers/proposal_pipeline_shop_manager.py"
        - "src/will/workers/violation_remediator.py"
        - "src/will/workers/violation_remediator_proposal.py"
        - "src/will/workers/audit_violation_sensor.py"
        - "src/will/workers/violation_executor.py"

# ==============================================================================
# Meta: This mapping file restores CORE's founding architectural principle
# ==============================================================================
