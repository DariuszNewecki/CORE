# .intent/enforcement/mappings/architecture/artifact_discovery.yaml
#
# Enforcement mapping for the architecture.artifact_discovery_through_registry
# rule (ADR-090 §Verification gate 9; issue #566).
#
# The check itself is per-file (AST-walked by ast_gate.ArtifactDiscoveryCheck)
# and lives at src/mind/logic/engines/ast_gate/checks/artifact_discovery_check.py.
# The check function self-filters by file location to the artifact-pipeline
# prefixes (will/workers, mind/governance, mind/coherence,
# body/services/crawl_service) — out-of-scope files short-circuit to empty
# violations without further inspection. Broad scope here is therefore
# safe: ast_gate visits every src/**/*.py file once, the check rejects
# files outside the pipeline directories at the cost of a single AST walk.

mappings:
  # LAW: artifact-pipeline components MUST consult the artifact_type registry
  # via IntentRepository — not hardcoded extension-based globs.
  # Enforcement: per-file AST check via ast_gate; ramp posture below.
  architecture.artifact_discovery_through_registry:
    engine: ast_gate
    params:
      check_type: artifact_discovery_through_registry
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**"
        - "src/shared/infrastructure/intent/**"
        # Non-discovery carve-outs surfaced by #566 triage (#586):
        # The rule's own statement exempts "non-discovery file walks (test
        # runners, config loaders, build tooling)". The three entries below
        # are concrete instances — each walks a narrow subset of a registered
        # artifact_type for a non-discovery purpose. Removing a carve-out
        # entry requires either (a) demonstrating the file IS performing
        # artifact discovery, or (b) refactoring it to route through the
        # registry. Until then the explicit exclusion is the honest signal.
        #
        # Config loader: loads enforcement mappings (intent_yaml subset)
        # into a cache for the rule extractor.
        - "src/mind/governance/enforcement_loader.py"
        # Service: reads policy JSONs (intent_json subset) to compute
        # rule-coverage statistics, not to discover policies.
        - "src/mind/governance/policy_coverage_service.py"
        # Coherence check: reads ADR markdown (spec_markdown subset) to
        # extract Relates: cross-references for reconciliation analysis.
        - "src/mind/coherence/checks/r1_scoped.py"
