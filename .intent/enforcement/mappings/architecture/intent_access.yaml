# .intent/enforcement/mappings/architecture/intent_access.yaml
#
# Enforces canonical access to .intent governance memory.
#
# Rule ID renamed under #490 (ADR-077 cleanup):
#   old: architecture.intent.non_gateway_no_direct_resolution
#   new: architecture.namespace.no_direct_protected_access
# The check_type was renamed simultaneously from `direct_intent_access`
# to `protected_namespace_access`. The check still hardcodes `.intent/`
# semantics; promoting markers/gateway to rule-supplied parameters is
# follow-up generalisation work tracked separately.

mappings:
  architecture.namespace.no_direct_protected_access:
    engine: ast_gate
    params:
      check_type: protected_namespace_access
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/shared/infrastructure/intent/**"
        - "src/body/project_lifecycle/scaffolding_service.py"
        - "src/body/services/intent_schema_validator.py"
        - "src/mind/governance/meta_validator.py"
        - "src/cli/commands/daemon.py"
        - "src/will/workers/worker_shop_manager.py"
        # 2026-06-06 expansion: auditor / coherence-checker exemptions.
        # Same pattern as meta_validator and intent_schema_validator
        # already excluded above — these files audit .intent/ structure
        # for coherence, which requires seeing raw paths/contents the
        # gateway normalizes away. Adding via flat list rather than
        # introducing a new CORE_ROLE for "auditor" — that's an
        # ADR-095 D3 amendment, not warranted by 6 entries today.
        - "src/mind/coherence/**/*.py"            # CCC checks + checker (ADR-067)
        - "src/mind/logic/engines/artifact_gate.py"   # F-41 registry walker
        - "src/mind/logic/engines/runtime_gate.py"    # ADR-077 runtime access checker
        - "src/body/services/representation_coherence_service.py"  # coherence service body counterpart
        - "tests/**/*.py"
        - "src/cli/logic/byor.py"                        # External repo delivery — reads starter-intent template and work/staged/ external dirs, not CORE's governance namespace; writes via ActionExecutor
        - "src/mind/logic/engines/contracts_gate.py"     # Mind engine auditing .intent/enforcement/contracts/ coherence — same exemption as artifact_gate.py and runtime_gate.py
        - "src/mind/logic/engines/registry.py"            # EngineRegistry loads passive-alias taxonomy from .intent/taxonomies/ at registration time — same pattern as artifact_gate.py and runtime_gate.py

  # ADVISORY DECLARATIONS — architectural guidance, not engine-checkable.
  # These rules describe how .intent/ should be structured and accessed.
  # They are constitutionally binding guidance for human architects.

  architecture.intent.gateway_is_shared_infrastructure:
    engine: advisory
    params:
      note: >
        Architectural guidance. The .intent/ gateway is shared infrastructure
        owned by no single layer. All layers access .intent/ through the
        canonical gateway, never by direct path construction. Enforced by
        architectural review and PathResolver usage convention.
    scope:
      applies_to:
        - "src/**/*.py"

  architecture.intent.no_legacy_root_assumptions:
    engine: advisory
    params:
      note: >
        Architectural guidance. No code may assume .intent/ lives at the
        repository root via hardcoded relative paths. All .intent/ access
        must use PathResolver. Enforced by convention and code review.
    scope:
      applies_to:
        - "src/**/*.py"
