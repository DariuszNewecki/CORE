# .intent/enforcement/mappings/architecture/intent_access.yaml
#
# Enforces canonical access to .intent governance memory.

mappings:
  architecture.intent.non_gateway_no_direct_resolution:
    engine: ast_gate
    params:
      check_type: direct_intent_access
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/shared/infrastructure/intent/**"
        - "src/body/project_lifecycle/scaffolding_service.py"
        - "src/body/services/intent_schema_validator.py"
        - "src/mind/governance/meta_validator.py"
        - "src/will/commands/daemon.py"
        - "src/will/workers/worker_auditor.py"
        - "tests/**/*.py"
