mappings:
  # 1. LAW: Production code MUST NOT contain 'TODO', 'FIXME', or 'TBD'
  # Check type: regex_gate (Deterministic String Match)
  purity.no_todo_placeholders:
    engine: regex_gate
    params:
      forbidden_patterns:
        - "\\bTODO\\b"
        - "\\bFIXME\\b"
        - "\\bTBD\\b"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"
        - "scripts/**/*.py"

  # 2. LAW: Every public symbol MUST have a stable '# ID:' anchor
  # Check type: ast_gate (Context-Aware definition lookup)
  purity.stable_id_anchor:
    engine: ast_gate
    params:
      check_type: id_anchor
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "**/__init__.py"
        - "tests/**/*.py"
        - "scripts/**/*.py"

  # 3. LAW: Metadata belongs in the DB, not the code (@capability, @owner)
  # Check type: ast_gate (Decorator inspection)
  purity.no_metadata_decorators:
    engine: ast_gate
    params:
      check_type: forbidden_decorators
      forbidden:
        - "capability"
        - "meta"
        - "owner"
        - "domain"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"

  # 4. LAW: Public symbols MUST have docstrings
  # CONSTITUTIONAL FIX: Removed the 'returns_type' shim that caused 440 errors.
  # We use the LLM gate here because verifying docstring presence and quality
  # is a semantic reasoning task.
  purity.docstrings.required:
    engine: llm_gate
    params:
      instruction: "Verify that all public functions and classes have a docstring. Return a violation if a docstring is missing or is just a placeholder like 'TODO'."
    scope:
      applies_to:
        - "src/will/**/*.py"
        - "src/body/**/*.py"

  # 5. LAW: Public functions and methods MUST have unique UUID identifiers
  # (Duplicate of purity.stable_id_anchor to satisfy linkage.json requirements)
  linkage.assign_ids:
    engine: ast_gate
    params:
      check_type: id_anchor
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "**/__init__.py"
        - "tests/**/*.py"

  # 6. LAW: Symbol identifiers MUST be globally unique across the codebase
  # Check type: knowledge_gate (Cross-Substrate Database Query)
  linkage.duplicate_ids:
    engine: knowledge_gate
    params:
      check_type: duplicate_ids

  # 7. LAW: Code MUST NOT contain exact AST duplicates
  purity.no_ast_duplication:
    engine: knowledge_gate
    params:
      check_type: ast_duplication
      threshold: 1.0
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"

  # 8. LAW: Code SHOULD NOT contain semantic duplicates
  purity.no_semantic_duplication:
    engine: knowledge_gate
    params:
      check_type: semantic_duplication
      threshold: 0.85
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"

  purity.logic_conservation:
    engine: llm_gate
    params:
      instruction: >
        Compare the proposed refactor to the original code.
        Verify that no significant domain logic has been deleted.
        If the code size shrunk by more than 50%, ensure it was due to
        de-duplication, not logic removal.

  purity.no_dead_code:
    engine: workflow_gate
    params:
      check_type: dead_code_check
      tool: "vulture"
      confidence: 80

  # 9. LAW: Production source files MUST be reachable from a declared entry point.
  # Check type: knowledge_gate (Import graph traversal)
  # Rationale: vulture detects unused symbols but cannot detect unreachable files.
  # This check traverses the import graph from entry points and flags orphan files.
  #
  # DYNAMIC PLUGIN DIRECTORIES (loaded via pkgutil.iter_modules / importlib):
  #   - src/mind/logic/engines/   → EngineRegistry (mind/logic/engines/registry.py)
  #   - src/mind/governance/checks/ → check_registry.py
  #   - src/will/workers/         → cli/resources/workers/run.py
  #   - src/will/phases/          → will/orchestration/phase_registry.py
  #   - src/body/services/        → body/services/service_registry.py
  # These are convention-loaded at runtime — not reachable via static import graph.
  purity.no_orphan_files:
    engine: knowledge_gate
    params:
      check_type: orphan_file_check
      entry_points:
        # Static entry points
        - "src/cli/"
        - "src/body/atomic/"
        - "src/main.py"
        - "src/api/main.py"
        # Dynamic plugin directories — loaded by registry scan, not static imports
        - "src/mind/logic/engines/"
        - "src/mind/governance/checks/"
        - "src/will/workers/"
        - "src/will/phases/"
        - "src/body/services/"
      excludes:
        - "src/**/__init__.py"
        - "src/**/__main__.py"
        - "src/**/conftest.py"
        - "scripts/**/*.py"
        - "src/api/**"
        - "src/body/analyzers/**"
        - "src/body/autonomy/**"
        - "src/body/evaluators/**"
        - "src/body/governance/**"
        - "src/body/introspection/**"
