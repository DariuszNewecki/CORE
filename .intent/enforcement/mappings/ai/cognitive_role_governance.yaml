# .intent/enforcement/mappings/ai/cognitive_role_governance.yaml
# Enforcement mappings for Cognitive Role Invocation Governance
# Rule document: .intent/rules/ai/cognitive_role_governance.json

mappings:

  ai.cognitive_role.no_hardcoded_string:
    engine: regex_gate
    params:
      forbidden_patterns:
        - "aget_client_for_role\\(\"[A-Za-z]"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "tests/**/*.py"
        - "**/__init__.py"
        - "src/will/orchestration/cognitive_service.py"
