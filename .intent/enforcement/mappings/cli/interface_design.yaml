# .intent/enforcement/mappings/cli/interface_design.yaml
#
# Enforcement mappings for CLI interface design rules.
# Based on: .intent/rules/cli/interface_design.json
#
# ENFORCEMENT NOTE:
#   These rules are enforced at AUDIT time by the cli_gate engine
#   (src/mind/logic/engines/cli_gate.py), which imports the Typer app
#   once per audit and introspects the command registry, then dispatches
#   the check_types below.
#
#   All cli_gate check_types are CONTEXT-LEVEL (is_context_level_for ->
#   True): they inspect the command registry / loader as a whole, not
#   individual files. SCOPE_INERT (ADR-076 D6) therefore skips per-file
#   scope matching for them, so the `applies_to` glob is documentary —
#   it names the surface examined, not a per-file trigger.
#
#   Engine binding lives HERE, not in the rule JSON. The previous
#   inline `check` blocks on cli.no_layer_exposure / cli.standard_verbs
#   were removed (they were the only inline check blocks in the rule
#   corpus); their data now lives in this file's params.

mappings:
  # LAW: Command paths MUST be depth 2-3; depth MUST NOT exceed 3.
  cli.resource_first:
    engine: cli_gate
    params:
      check_type: resource_first
      min_depth: 2
      max_depth: 3
    scope:
      applies_to: ["src/cli/**/*.py"]

  # LAW: Resource names MUST NOT expose internal architecture layers
  cli.no_layer_exposure:
    engine: cli_gate
    params:
      check_type: no_layer_exposure
      forbidden_resources: ["mind", "body", "will", "manage", "check", "fix"]
    scope:
      applies_to: ["src/cli/**/*.py"]

  # LAW: Action names SHOULD use standard verbs from approved vocabulary
  cli.standard_verbs:
    engine: cli_gate
    params:
      check_type: standard_verbs
      # 2026-06-06 vocabulary expansion: 20 standard CLI idioms added
      # (bootstrap, build, check, dashboard, down, explain, health, import,
      # purge, remediate, repair-counts, report, resolve, restart, run,
      # start, supersede, sync-env, triage, up) covering systemd-style
      # daemon control, healthchecks, dashboards, and other idioms the
      # rule was flagging on legitimate uses. Noun-shaped command names
      # (blackboard, capabilities, commands, search.search) are not
      # added — they are genuine drift and remain architectural-judgment
      # per ADR-095 D1 posture.
      # 2026-06-23 vocabulary expansion: 9 domain verbs added
      # (accept, claim, gap-analysis, ingest, next, promote, propose,
      # scout, search) covering Lane workflow, GRC operations, and Project
      # lifecycle idioms that were absent from the list.
      allowed_verbs:
        - accept
        - actions
        - analyze
        - approve
        - audit
        - audit-duplicates
        - baseline
        - bootstrap
        - build
        - chat
        - check
        - check-imports
        - check-ui
        - claim
        - clarity
        - cleanup
        - complexity
        - coverage
        - create
        - dashboard
        - delete
        - docs
        - docstrings
        - down
        - drift
        - execute
        - explain
        - export
        - export-context
        - fix-atomic
        - fix-ids
        - forensics
        - format
        - format-imports
        - gap-analysis
        - generate
        - get
        - health
        - import
        - info
        - ingest
        - inspect
        - legacy
        - lint
        - list
        - logging
        - migrate
        - new
        - next
        - onboard
        - patterns
        - promote
        - propose
        - purge
        - query
        - rebuild
        - refactor
        - refactor-settings
        - refusals
        - reject
        - remediate
        - repair-counts
        - report
        - resolve
        - resolve-duplicates
        - restart
        - rewire
        - rewire-imports
        - run
        - score
        - scout
        - search
        - self-check
        - set
        - show
        - start
        - stats
        - status
        - strategic_audit
        - suggest
        - summary
        - supersede
        - sync
        - sync-code
        - sync-env
        - sync-registry
        - tag
        - test
        - test-stability
        - traces
        - triage
        - up
        - validate
        - validate-env
        - verify
    scope:
      applies_to: ["src/cli/**/*.py"]

  # LAW: Mutating commands MUST require --write flag or confirmation
  cli.dangerous_explicit:
    engine: cli_gate
    params:
      check_type: dangerous_explicit
    scope:
      applies_to: ["src/cli/**/*.py"]

  # LAW: Async commands MUST be wrapped with @core_command decorator
  cli.async_execution:
    engine: cli_gate
    params:
      check_type: async_execution
      required_decorator: "core_command"
    scope:
      applies_to: ["src/cli/**/*.py"]

  # LAW: CLI module imports MUST be fail-fast at process start
  # (restated per ADR-076 D6 — see rule JSON. Structural check: static
  #  imports, no error-swallowing around the CLI loader.)
  cli.discovery_strict:
    engine: cli_gate
    params:
      check_type: discovery_strict
      loader: "src/cli/admin_cli.py"
    scope:
      applies_to: ["src/cli/**/*.py"]

  # LAW: Every command MUST provide help text
  cli.help_required:
    engine: cli_gate
    params:
      check_type: help_required
    scope:
      applies_to: ["src/cli/**/*.py"]
