# .intent/enforcement/config/test_coverage.yaml
#
# Test Coverage Scanning Configuration
# Authority: policy
# Phase: audit
# Status: active
#
# PURPOSE:
#   Governs how TestCoverageSensor scans for untested source files.
#   Changing what gets scanned or excluded is an .intent/ edit, not
#   a code change.
#
# RULE: TestCoverageSensor MUST read scan parameters from this file.
#   No paths or exclusions may be hardcoded in src/.

source_root: "src"
test_root: "tests"
test_file_suffix: "/test_generated.py"

excluded_filenames:
  - "__init__.py"

# Scope limiter — if non-empty, only these files are scanned.
# Remove or leave empty to scan the full source_root.
#
# 2026-06-28: Widened from 1 file (body pilot) to 25 files covering
# all substantive uncovered files in src/will/workers/ (24 new +
# the existing body pilot kept for continuity).
#
# Prerequisite fix landed same session (#703 context fix):
#   - ContextBuildRequest gains task_type field (models.py)
#   - build_for_task() passes task_type through (service.py)
#   - _select_providers() skips "db" for test_generation (builder.py)
#   - build_tests_action.py goal string now carries asyncio_mode=auto +
#     mock constraints explicitly
#   - test_gen_prompt/system.txt: ASYNCIO RULES block added
#
# Root cause of prior cap-hits (circuit_breaker, audit_violation_normalizer,
# etc.): DB evidence provider was injecting async Worker base class + ORM
# symbols into the LLM context, causing @pytest.mark.asyncio decorators and
# real-Worker instantiation that broke pytest collection. That path is now
# gated: test_generation task_type never reaches the DB provider.
#
# Ordering: low-risk files first (pure helpers, small models) so the sensor
# exercises the success path before the complex orchestration files queue.
include_files:
  # ── body pilot (verified success path) ────────────────────────────────────
  - "src/body/self_healing/placeholder_fixer_service.py"

  # ── will/workers — pure helpers / models (lowest risk) ────────────────────
  - "src/will/workers/violation_remediator_body/models.py"
  - "src/will/workers/repo_embedding/helpers.py"
  - "src/will/workers/test_remediator/_operations.py"
  - "src/will/workers/violation_remediator_body/ceremony.py"
  - "src/will/workers/violation_remediator_blackboard.py"

  # ── will/workers — sensors (bounded deps) ─────────────────────────────────
  - "src/will/workers/coherence_sensor.py"
  - "src/will/workers/test_coverage_sensor.py"
  - "src/will/workers/test_runner_sensor.py"
  - "src/will/workers/capability_tagger.py"
  - "src/will/workers/audit_ingest_worker.py"

  # ── will/workers — mid-complexity workers ─────────────────────────────────
  - "src/will/workers/observer_worker.py"
  - "src/will/workers/intent_inspector.py"
  - "src/will/workers/prompt_extractor_worker.py"
  - "src/will/workers/violation_remediator_body/_host.py"
  - "src/will/workers/violation_remediator_body/llm.py"
  - "src/will/workers/violation_remediator_body/context.py"
  - "src/will/workers/violation_remediator_proposal.py"
  - "src/will/workers/worker_shop_manager.py"

  # ── will/workers — proposal pipeline ──────────────────────────────────────
  - "src/will/workers/proposal_consumer_effects.py"
  - "src/will/workers/proposal_consumer_revival.py"
  - "src/will/workers/proposal_consumer_worker.py"

  # ── will/workers — external-service-heavy (Qdrant / DB / FS) ─────────────
  - "src/will/workers/governance_embedding/governance_embedder_worker.py"
  - "src/will/workers/repo_embedding/repo_embedder_workers.py"
  - "src/will/workers/repo_crawler.py"
  - "src/will/workers/db_sync_worker.py"

  # ── api/v1 route modules (2026-07-06: scope widened to cover API layer) ────
  # Ordered low→high complexity so the sensor exercises the success path first.
  # Each maps to tests/api/v1/<module>/test_generated.py (sensor suffix).
  # Hand-written tests/api/v1/test_<module>.py files are separate; no collision.
  - "src/api/v1/lint_routes.py"
  - "src/api/v1/integration_routes.py"
  - "src/api/v1/knowledge_routes.py"
  - "src/api/v1/integrity_routes.py"
  - "src/api/v1/lane_routes.py"
  - "src/api/v1/daemon_routes.py"
  - "src/api/v1/census_routes.py"
  - "src/api/v1/coverage_routes.py"
  - "src/api/v1/quality_routes.py"
  - "src/api/v1/sync_routes.py"
  - "src/api/v1/inspect_routes.py"
  - "src/api/v1/development_routes.py"
  - "src/api/v1/audit_routes.py"
  - "src/api/v1/refactor_routes.py"
  - "src/api/v1/fix_routes.py"
  - "src/api/v1/proposals_routes.py"
