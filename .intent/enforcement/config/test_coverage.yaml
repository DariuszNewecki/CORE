# .intent/enforcement/config/test_coverage.yaml
#
# Test Coverage Scanning Configuration
# Authority: policy
# Phase: audit
# Status: active
#
# PURPOSE:
#   Governs how TestCoverageSensor scans for untested source files.
#   Changing what gets scanned or excluded is an .intent/ edit, not
#   a code change.
#
# RULE: TestCoverageSensor MUST read scan parameters from this file.
#   No paths or exclusions may be hardcoded in src/.

source_root: "src"
test_root: "tests"
test_file_suffix: "/test_generated.py"

excluded_filenames:
  - "__init__.py"

# Scope limiter — if non-empty, only these files are scanned.
# Remove or leave empty to scan the full source_root.
#
# Incremental scope-opening (2026-06-13): the test-gen loop is now hardened on
# both axes — static pre-write (IntentGuard import-resolution + #589 shape
# checks) and dynamic post-heal (test.sandbox_validate, the required final step
# of flow.build_tests; a non-zero pytest exit halts the flow and blocks the
# autonomous commit). The single-file pilot proved the loop; the trio below is
# the first measured widening — diverse autogen surfaces (one pure function, one
# async normalizer, one mixed pure+async worker) to watch the dynamic gate work
# before broadening further. Open in small batches, not all at once.
include_files:
  - "src/will/workers/blackboard_shop_manager.py"
  - "src/will/workers/audit_violation_filter.py"
  - "src/will/workers/audit_violation_normalizer.py"
  - "src/will/workers/circuit_breaker.py"
