# .intent/enforcement/config/test_coverage.yaml
#
# Test Coverage Scanning Configuration
# Authority: policy
# Phase: audit
# Status: active
#
# PURPOSE:
#   Governs how TestCoverageSensor scans for untested source files.
#   Changing what gets scanned or excluded is an .intent/ edit, not
#   a code change.
#
# RULE: TestCoverageSensor MUST read scan parameters from this file.
#   No paths or exclusions may be hardcoded in src/.

source_root: "src"
test_root: "tests"
test_file_suffix: "/test_generated.py"

excluded_filenames:
  - "__init__.py"

# Scope limiter — if non-empty, only these files are scanned.
# Remove or leave empty to scan the full source_root.
#
# Scope narrowed back to the single proven file (2026-06-13, reverting the
# 1->4 widening in 3c6482ff). The widening run validated the loop end-to-end —
# the risk-compute fix unblocked auto-approval and the dynamic gate
# (test.sandbox_validate) correctly rejected the generated tests that failed to
# run — but it also exposed a blast-radius bug (#629): flow.build_tests's fix.*
# steps reformat the entire tests/ tree instead of just the generated file, and
# build.tests output is not rolled back when a downstream gate fails. Re-open
# scope beyond this single file only after #629 is fixed, so the daemon cannot
# re-pollute the working tree on each generation.
include_files:
  - "src/will/workers/blackboard_shop_manager.py"
