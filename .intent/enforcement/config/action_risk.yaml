# .intent/enforcement/config/action_risk.yaml
# Authority: policy
# Phase: n/a (configuration, not a runtime phase)
# Status: active
#
# PURPOSE:
#   Single source of truth for action impact classification.
#   Governs which actions auto-execute (safe) versus which require
#   human approval (moderate) or are blocked unless explicitly
#   authorized (dangerous).
#
#   Consumed by src/body/atomic/executor.py via the helper
#   shared.infrastructure.intent.action_risk.
#
# RULE: impact_level for every registered action MUST be declared
#   here. No impact_level literals permitted in @register_action
#   decorators in src/. See ADR-008.
#
#   ADR-078 amendment (2026-05-30): risk values declared here are
#   cross-referenced by .intent/taxonomies/operational_capabilities.yaml
#   per ADR-078 D3. Any operational capability whose risk field does
#   not resolve to a defined entry here is a load-time failure of
#   src/shared/infrastructure/intent/operational_capabilities.py.
#
# VALUES: safe | moderate | dangerous
#
# FORMAT (ADR-120 D1): entries may be a plain impact_level string (unconstrained
# actions) or a mapping with impact_level + artifact_types (type-constrained).
#
#   fix.format: safe                          # unconstrained — old format, still valid
#   fix.format:                               # constrained — new dict format
#     impact_level: safe
#     artifact_types: [python]
#
# artifact_types values are F-41 artifact_type IDs. Actions whose artifact_types
# is absent or empty are unconstrained and may be dispatched for any artifact type.

actions:
  # ── Infrastructure / state machine / cross-artifact (unconstrained) ─────────
  action.execute: moderate
  admin.meta: safe
  assisted.apply_diff: moderate
  assisted.validate_diff: safe
  claim.proposal: safe
  cleanup.action_results: moderate
  cleanup.agent_memory: moderate
  crate.create: safe
  crate.create_from_spec: moderate
  file.create: moderate
  file.edit: moderate
  file.read: safe
  file.tag_metadata: safe
  log.archive_partitions: moderate
  log.maintain_partitions: safe
  logging.reconfigure: safe
  manage.define_symbols: moderate
  remediate.cognitive_role: moderate
  secrets.delete: dangerous
  secrets.get: safe
  secrets.list: safe
  secrets.set: moderate
  sync.db: moderate
  sync.knowledge_graph: moderate
  sync.vectors_code: moderate
  sync.vectors_constitution: moderate
  test.system: safe

  # ── Document corpus actions (artifact_types: [document_corpus]) ─────────────
  document.run.gap_analysis:
    impact_level: safe
    artifact_types: [document_corpus]

  # ── Python-specific actions (artifact_types: [python]) ──────────────────────
  # Primary autonomous path (ADR-133 D3): per-symbol generation via
  # context_aware_test_gen. Prompt: context_aware_test_gen (ADR-134 governed).
  build.test_for_symbol:
    impact_level: safe
    artifact_types: [python]
  # File-level generation path (ADR-133 D3: retained, not primary).
  # Callers: CoderAgent (task_type="test_generation") and the
  # coverage_remediation workflow (EnhancedTestGenerator → GenerationWorkflow).
  # Prompt: test_gen_prompt (ADR-134 governed, ADR-003 anchor).
  build.tests:
    impact_level: safe
    artifact_types: [python]
  check.body_contracts:
    impact_level: safe
    artifact_types: [python]
  check.imports:
    impact_level: safe
    artifact_types: [python]
  fix.atomic_actions:
    impact_level: moderate
    artifact_types: [python]
  fix.body_ui:
    impact_level: dangerous
    artifact_types: [python]
  fix.capability_tagging:
    impact_level: moderate
    artifact_types: [python]
  fix.docstrings:
    impact_level: moderate
    artifact_types: [python]
  fix.duplicate_ids:
    impact_level: moderate
    artifact_types: [python]
  fix.format:
    impact_level: safe
    artifact_types: [python]
  fix.headers:
    impact_level: safe
    artifact_types: [python]
  fix.ids:
    impact_level: safe
    artifact_types: [python]
  fix.imports:
    impact_level: safe
    artifact_types: [python]
  fix.logging:
    impact_level: safe
    artifact_types: [python]
  fix.modularity:
    impact_level: moderate
    artifact_types: [python]
  fix.path_resolver:
    impact_level: moderate
    artifact_types: [python]
  fix.placeholders:
    impact_level: safe
    artifact_types: [python]
  fix.purge_legacy_tags:
    impact_level: dangerous
    artifact_types: [python]
  fix.settings_access:
    impact_level: dangerous
    artifact_types: [python]
  fix.vulture_heal:
    impact_level: dangerous
    artifact_types: [python]
  refactor.apply_split:
    impact_level: dangerous
    artifact_types: [python]
  test.execute:
    impact_level: moderate
    artifact_types: [python]
  test.sandbox_validate:
    impact_level: safe
    artifact_types: [python]
