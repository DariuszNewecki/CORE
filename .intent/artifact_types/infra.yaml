$schema: "META/artifact_type.schema.json"
kind: artifact_type

id: infra
title: Infrastructure SQL
description: >
  SQL files under infra/ — schema definitions, migrations, infrastructure
  state. Authored at ADR-090 D7 (crawl_scopes.yaml retirement 2026-06-04).
  Routes to the docs vector collection per the historical crawler
  configuration (infra SQL semantically searched alongside documentation).

discovery:
  - "infra/**/*.sql"

identity_key: path
schema_ref: null
change_record: text_diff
vector_collection: core-docs   # historical: infra SQL routed to docs collection
crawler_indexed: true

supported_sensors: []   # F-42 forward (ADR-090 D5)
supported_actions: []   # F-43 forward (ADR-090 D5)
