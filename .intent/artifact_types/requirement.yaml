$schema: "META/artifact_type.schema.json"
kind: artifact_type

id: requirement
title: Requirements specification document
description: >
  Requirements documents under .specs/requirements/ — user-requirement specifications
  (URS) and related requirement catalogs. Modeled subtype of the broader .specs
  markdown surface (ADR-105 D4): carries a typed YAML frontmatter header validated
  against .specs/META/requirement.header.schema.json. Discovery overlaps the
  spec_markdown supertype by design (ADR-105 implementation note — additive,
  not replace); both route to the same core_specs collection (corrected #784
  — was core-specs, a duplicate of ADR-022's collection with zero consumers),
  so the overlap is benign (content-hash dedup). spec_markdown remains the
  discovery universe the CCC checks consume; this type adds the header model
  on top.

discovery:
  - ".specs/requirements/*.md"

identity_key: path
schema_ref: ".specs/META/requirement.header.schema.json"
change_record: text_diff
vector_collection: core_specs   # #784 — matches spec_markdown
crawler_indexed: false   # #784 — semantic search served by ADR-022's SpecsAdapter pipeline; still registers in repo_artifacts for CCC/governance

supported_sensors:
  - repo_crawler
supported_actions: []
