$schema: "META/artifact_type.schema.json"
kind: artifact_type

id: prompt
title: LLM prompt templates
description: >
  Prompt-template artifacts under var/prompts/ — per-prompt model manifest
  (model.yaml), system message (system.txt), user message (user.txt).
  Authored at ADR-090 D7 (crawl_scopes.yaml retirement 2026-06-04).

discovery:
  - "var/prompts/**/model.yaml"
  - "var/prompts/**/system.txt"
  - "var/prompts/**/user.txt"

identity_key: path
schema_ref: null   # model.yaml has its own schema but prompts as a class are mixed-format
change_record: replace   # small atomic prompt files
vector_collection: core-prompts
crawler_indexed: true

supported_sensors:        # ADR-091 D4 — authored set; introspected via taxonomy_gate
  - repo_crawler
supported_actions: []   # F-43 forward (ADR-090 D5)
