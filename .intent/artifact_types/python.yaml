$schema: "META/artifact_type.schema.json"
kind: artifact_type

id: python
title: Python source files
description: >
  Python source files governed by the constitutional rule engine via the
  AST gate and the audit sensor cohort. The reference artifact type
  exercised by every CORE-on-CORE governance loop today.

discovery:
  - "src/**/*.py"

identity_key: path
schema_ref: null   # AST-parsed, not JSON-schema-validated
change_record: text_diff
vector_collection: core-code   # ADR-090 D7 — was `code`, aligned with crawler's existing collection
crawler_indexed: true

# Note: tests/**/*.py lives in its own artifact_type `test` so the crawler
# can route test source to a distinct vector collection (core-tests) for
# semantic-search separation. Both are governance-equivalent Python source
# — the split is a vector-index concern, not a governance concern.

supported_sensors:        # ADR-091 D4 — authored set; introspected via taxonomy_gate
  - audit_sensor_architecture
  - audit_sensor_cli
  - audit_sensor_governance
  - audit_sensor_layout
  - audit_sensor_linkage
  - audit_sensor_logic
  - audit_sensor_modularity
  - audit_sensor_purity
  - audit_sensor_style
  - audit_violation_sensor
  - coherence_sensor
  - repo_crawler
  - test_coverage_sensor
  - test_runner_sensor
supported_actions:      # ADR-092-A (triggered by ADR-121 T5b)
  - build.tests
  - check.body_contracts
  - check.imports
  - fix.atomic_actions
  - fix.body_ui
  - fix.capability_tagging
  - fix.docstrings
  - fix.duplicate_ids
  - fix.format
  - fix.headers
  - fix.ids
  - fix.imports
  - fix.logging
  - fix.modularity
  - fix.path_resolver
  - fix.placeholders
  - fix.purge_legacy_tags
  - fix.settings_access
  - fix.vulture_heal
  - test.execute
  - test.sandbox_validate
