$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.doc_worker
  title: Documentation Worker
  version: "0.1.0"
  authority: policy
  status: paused
  rationale: >
    Paused because llm.local (Ollama) is not in active use for reasoning tasks.
    DocWorker invokes LocalCoder via cognitive_service for docstring generation.
    Activate when Ollama reasoning models are operational alongside embeddings.

identity:
  uuid: "8d1e536d-846f-4635-8955-2fdef4b72e6a"
  class: acting

mandate:
  responsibility: >
    Detect symbols with missing or degraded documentation and produce proposals
    to generate accurate docstrings grounded in code and constitutional intent.
  phase: runtime
  permitted_tools:
    - llm.local
  scope:
    paths:
      - "src/**/*.py"
    domains:
      - documentation
  approval_required: false

implementation:
  module: will.workers.doc_worker
  class: DocWorker
  requires_core_context: false
