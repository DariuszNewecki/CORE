$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.db_sync_worker
  title: DB Sync Worker
  version: "1.0.1"
  authority: policy
  status: active

identity:
  uuid: "d4e5f6a7-b8c9-4d0e-8f1a-2b3c4d5e6f70"
  class: acting

mandate:
  responsibility: >
    Keeps the PostgreSQL knowledge graph current by executing sync.db on a fixed
    schedule. Deterministic — no LLM. Posts a completion report on success and a
    finding on failure. Always posts a heartbeat.
  phase: execution
  permitted_tools:
    - sync.db
  approval_required: false
  scope:
    domains:
      - knowledge
      - compliance
  schedule:
    # Bumped 300 -> 360 per #516's first-cycle finding (observed p95=330.2s
    # over 24h, n=293). The 300s threshold sat within measurement jitter
    # of the worker's actual cycle and was a worker.silent false-positive
    # source. 360 leaves comfortable headroom over observed reality.
    #
    # Bumped 360 -> 420 (2026-06-09) under ADR-103. Audit observed p95=396.2s
    # over 24h (n=240) — the bare-minimum 0.2s breach of the 360×1.1=396.0s
    # threshold. Per ADR-103 D2 a fire means real cycle has grown past the
    # cap, not that the rule is too tight; investigation confirmed the
    # growth is steady-state graph-sync work, not a regression. 420 holds
    # the same 1.1 multiplier comfortably (p95=396.2 << 420×1.1=462).
    max_interval: 420

implementation:
  module: will.workers.db_sync_worker
  class: DbSyncWorker
  requires_core_context: true
  # ADR-081 D2(1) — flipped to dedicated per loop-hold telemetry: sustained
  # p50=9.9s, max=50.5s on the shared core-daemon, well over D2(1)'s 5s gate.
  # D7 fires escalation_required on this worker today (#596 thread).
  requires_dedicated_process: true
