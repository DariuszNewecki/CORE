$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.self_healing_agent
  title: Self-Healing Agent
  version: "1.0.0"
  authority: policy
  status: paused
  rationale: >
    Superseded by audit_sensor_linkage. This worker posted linkage.assign_ids
    findings via a bespoke AST scan; audit_sensor_linkage covers the same
    rule through the standard constitutional audit loop (AuditViolationSensor
    scoped to the linkage.* namespace). Running both produces duplicate
    blackboard findings for the same violations.

identity:
  uuid: "a3f7c2d1-b4e8-4f91-9c2a-7d5e6b8f0a3c"
  class: sensing

mandate:
  responsibility: >
    Scan src/**/*.py for public symbols missing # ID: tags and post one
    blackboard finding per affected file. No LLM calls. No file writes.
    Findings are consumed by ViolationRemediatorWorker which maps
    linkage.assign_ids to the assign_missing_ids action handler.
  phase: audit
  permitted_tools: []
  scope:
    paths:
      - "src/**/*.py"
    domains:
      - compliance
  approval_required: false

implementation:
  module: will.workers.self_healing_agent
  class: SelfHealingAgent
  requires_core_context: true
