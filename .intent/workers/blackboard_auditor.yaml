$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.blackboard_auditor
  title: Blackboard Auditor
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "d4e5f6a7-c8d9-4e0f-1a2b-3c4d5e6f7a8b"
  class: governance

mandate:
  responsibility: >
    Detect Blackboard entries that have exceeded their constitutional SLA
    and post a finding for each stale unclaimed or unresolved entry.
  phase: audit
  approval_required: false
  scope:
    domains:
      - governance
      - compliance
  schedule:
    max_interval: 120

implementation:
  module: will.workers.blackboard_auditor
  class: BlackboardAuditor
  requires_core_context: false
