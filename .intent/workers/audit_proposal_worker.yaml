$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_proposal_worker
  title: Audit Proposal Worker
  version: "0.1.0"
  authority: policy
  status: active

identity:
  uuid: "a3b4c5d6-e7f8-9012-abcd-ef1234567890"
  class: acting

mandate:
  responsibility: >
    Read the latest audit findings from reports/audit_findings.json, identify
    violations that can be fixed by registered atomic actions, deduplicate against
    active proposals already in the DB, and create one Proposal per action group.
    Posts a blackboard report summarising proposals created. No LLM calls.
  phase: remediation
  permitted_tools:
    - proposal.create
    - proposal.list
  scope:
    paths:
      - reports/audit_findings.json
    domains:
      - audit
      - autonomy
      - proposals
  approval_required: false

implementation:
  module: will.workers.audit_proposal_worker
  class: AuditProposalWorker
  requires_core_context: false
