$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_sensor_logic
  title: Audit Sensor — Logic
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "b3c4d5e6-f7a8-9012-bcde-f12345678902"
  class: sensing

mandate:
  responsibility: >
    Run the constitutional auditor scoped to the logic rule namespace and post
    each unprocessed violation as a blackboard finding for downstream remediation.
  phase: audit
  permitted_tools: []
  scope:
    rule_namespace: "logic"
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 600

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
