$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_sensor_logic
  title: Audit Violation Sensor - Logic
  version: "1.0.0"
  authority: policy
  status: paused

identity:
  uuid: "def9dd46-d731-400b-a332-c86d6f8c9ff3"
  class: sensing

mandate:
  responsibility: >
    Run the constitutional auditor scoped to all logic.* rules and post
    each unprocessed violation as a blackboard finding for downstream
    processing by ViolationRemediatorWorker. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  scope:
    rule_namespace: "logic"
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 600

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
  params:
    dry_run: false
