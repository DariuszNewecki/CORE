$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_sensor_modularity
  title: Audit Violation Sensor - Modularity
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "e5f6a7b8-c9d0-4234-9abc-345678901234"
  class: sensing

mandate:
  responsibility: >
    Run the constitutional auditor scoped to all modularity.* rules and post
    each unprocessed violation as a blackboard finding for downstream
    processing by ViolationRemediatorWorker. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  scope:
    rule_namespace: "modularity"
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 600

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
  params:
    dry_run: false
