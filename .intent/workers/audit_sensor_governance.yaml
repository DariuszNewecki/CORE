$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_sensor_governance
  title: Audit Violation Sensor - Governance
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "9b3e7d4a-2c81-4f56-8e3b-1d5f9a7c4b28"
  class: sensing

# Closes the namespace-dispatch gap discovered during ADR-091 D2 commit-1c
# engine landing (#575): the taxonomy_gate engine hosts three context-level
# checks under the governance.taxonomy.* namespace
# (operational_capabilities_decorator_backing, sensor_supported_by_declaration,
# self_resolve_resolver_owned), but no sensor was claiming the governance
# namespace. All three rules were declared and mapped but silently inert.

mandate:
  responsibility: >
    Run the constitutional auditor scoped to all governance.* rules and post
    each unprocessed violation as a blackboard finding for downstream
    processing by ViolationRemediatorWorker. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  scope:
    rule_namespace: "governance"
    artifact_type:
      - python
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 1200

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
  # ADR-081 D2(2) — the dispatched checks include taxonomy_gate's context-
  # level sweeps over src/ + tests/ (self_resolve_resolver_owned walks both
  # surfaces; operational_capabilities_decorator_backing walks src/ and the
  # full operational_capabilities.yaml). Dedicated process matches the
  # other audit_sensor_* workers' classification.
  requires_dedicated_process: true
  params:
    dry_run: false
