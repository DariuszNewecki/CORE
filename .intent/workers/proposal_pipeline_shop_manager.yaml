$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.proposal_pipeline_shop_manager
  title: Proposal Pipeline ShopManager
  version: "1.1.0"
  authority: policy
  status: active

identity:
  uuid: "2942eaa4-c9a7-45b2-ab86-5eda2363b384"
  class: acting

mandate:
  responsibility: >
    Patrols the proposal pipeline for stuck-in-approved, stuck-executing,
    and repeated-failure pathologies (CORE-ShopManager.md §3.3), terminating
    and reviving stuck-executing rows per the ADR-104 D9 revival contract
    while leaving stuck-approved and repeated-failure cases as detection-only.
  phase: audit
  approval_required: false
  scope:
    domains:
      - governance
      - compliance
  schedule:
    max_interval: 300

implementation:
  module: will.workers.proposal_pipeline_shop_manager
  class: ProposalPipelineShopManager
  requires_core_context: false
