$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.violation_remediator
  title: Violation Remediator
  version: "0.1.0"
  authority: policy
  status: active

identity:
  uuid: "bb52f62a-45c9-47a4-9ff8-788b0c6ca4f1"
  class: acting

mandate:
  responsibility: >
    For each open audit violation finding on the blackboard, build a context
    package for the violating file, invoke RemoteCoder (Grok) via PromptModel
    to produce a fix, validate via Crate/Canary ceremony, and apply to live
    src/ with a git commit. Supports dry-run mode: LLM and Canary run but
    nothing is applied or committed. Proposed fix is posted to the blackboard
    for human review.
  phase: execution
  permitted_tools:
    - llm.remote_coder
    - file.read
    - crate.create
    - canary.validate
    - crate.apply
    - git.commit
  scope:
    paths:
      - "src/**"
      - "var/mind/rollbacks/**"
    domains:
      - compliance
      - remediation
  approval_required: true

implementation:
  module: will.workers.violation_remediator
  class: ViolationRemediatorWorker
  requires_core_context: true
