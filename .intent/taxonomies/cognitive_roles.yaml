version: "1.1.0"
status: active
authority: constitutional
title: CORE Cognitive Role Taxonomy
description: >
  Canonical declaration of cognitive roles in CORE. A cognitive role is a
  stable responsibility within the system: it states why cognition is
  required, not how it is executed. This file is the authoritative source of
  the cognitive-role name set and required_capabilities — the values
  referenced by the `role` field in var/prompts/**/model.yaml, by the
  core.cognitive_roles table, and by every foreign key that points at it.
  required_capabilities is a Role-layer concern (paper §2.2, §3): it declares
  what technical abilities the role requires, used as the matching predicate
  against resource provided_capabilities. Model/provider bindings and
  specialization are Resource-layer concerns managed outside this file.
  Framework authority: .specs/papers/CORE-Cognitive-Role-Capability-Resource-Taxonomy.md.
  ConstitutionalCoherenceAnalyst declared by ADR-067. ADR-090 added
  required_capabilities to all roles and corrected the scope statement.

roles:
  Architect:
    description: High-reasoning role for complex architectural refactoring and design.
    required_capabilities:
      - reasoning
      - analysis
      - planning

  CapabilityTagger:
    description: Tags orphaned symbols with canonical dot-notation capability keys.
    required_capabilities:
      - json_output
      - code_understanding

  CodeReviewer:
    description: Reviews code for clarity, style, and correctness.
    required_capabilities:
      - code_review
      - code_understanding

  Coder:
    description: Generates and refactors source code.
    required_capabilities:
      - code_generation

  ConstitutionalCoherenceAnalyst:
    description: >
      Candidate-finder for constitutional document coherence analysis.
      Identifies potential contradictions, gaps, and drift between ADRs, rule
      domains, and northstar documents. Read-only, analysis-only.
    required_capabilities:
      - reasoning
      - analysis
      - json_output
      - schema_compliance

  DocstringWriter:
    description: Authors and maintains docstrings and inline documentation for code artifacts.
    required_capabilities:
      - code_understanding
      - code_generation

  LocalCoder:
    description: Locally-executed coding role for symbol enrichment and code-adjacent reasoning.
    required_capabilities:
      - code_understanding
      - json_output

  LocalReasoner:
    description: >
      Constitutional reasoning role for governance inspection, policy coherence
      analysis, and cross-document alignment checks.
    required_capabilities:
      - reasoning
      - analysis
      - document_parsing

  Planner:
    description: Decomposes high-level goals into step-by-step plans.
    required_capabilities:
      - planning

  RemoteCoder:
    description: Cloud-based code generation and remediation.
    required_capabilities:
      - code_generation
      - reasoning

  Vectorizer:
    description: Creates semantic vector embeddings from text.
    required_capabilities:
      - embedding
