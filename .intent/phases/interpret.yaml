phase_type: interpret
description: 'Convert natural language user intent into canonical task structure.
  This is the constitutional entry point for the Will layer.

  Interpret bridges ungoverned (human communication) with governed (system execution).

  '
inputs:
- user_request
- conversation_context
- available_workflows
outputs:
- task_structure
- workflow_type
- clarification_needed
constitutional_requirements:
- governance.no_governance_bypass
- autonomy.tracing.mandatory
authority: policy
failure_mode: clarify
max_retries: 3
agent_role: IntentInterpreter
llm_tier: high
permitted_actions:
- parse_natural_language
- classify_intent
- map_to_workflow
- request_clarification
- validate_task_structure
forbidden_actions:
- execute_code
- modify_files
- create_policies
- bypass_parse_validation
- assert_authority
success_criteria:
  task_structure_valid: true
  workflow_identified: true
notes: 'INTERPRET is the first constitutional phase.

  It does NOT have authority to execute - only to propose task structures that will
  be validated in subsequent phases.

  Failure mode is ''clarify'' rather than ''block'' because ambiguous input should
  result in dialogue, not rejection.

  This phase completes the Mind-Body-Will architecture by giving the Will layer a
  constitutional entry point with clear boundaries.

  '
implementation: will.phases.interpret_phase.InterpretPhase
