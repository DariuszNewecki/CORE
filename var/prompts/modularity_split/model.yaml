id: modularity_split
version: "1.0"
role: Architect
description: >
  Executes a pre-approved split plan. Produces exact file contents
  for each resulting file. No reasoning. Pure mechanical execution.

input:
  required:
    - file_path
    - layer
    - content
    - plan

output:
  # `format: json` maps to OpenAI-compatible `response_format: {"type":
  # "json_object"}` (see PromptModel._build_response_format). A `json_schema:`
  # block here would emit `response_format: {"type": "json_schema", ...}`,
  # which DeepSeek's API rejects with HTTP 400. Shape enforcement falls to
  # must_contain + post-parse validation via shared.ai.response_parser.
  format: json
  max_length: 8000
  must_contain:
    - "files"
    - "path"
    - "content"

model:
  max_tokens: 16384
  temperature: 0.0

success_criteria: >
  Returns valid JSON with files array covering every path in the split plan.
  Every symbol from the original file appears in exactly one output file.
  All # ID: tags are preserved exactly as found in the original.
