id: grc_judge
version: "0.3.0"
role: ConstitutionalCoherenceAnalyst
description: >
  Assesses whether a document satisfies a single compliance requirement, for
  GRC gap-analysis. Returns a three-way verdict: satisfied (document covers the
  requirement), gap (document addresses it but is deficient), or silent (document
  does not address this requirement — absence of evidence, not failure).
input:
  required:
    - instruction
    - rationale
    - content
  optional:
    - source_context   # Pre-formatted "AUTHORITATIVE SOURCE CONTEXT" block from the
                       # internal corpus (ADR-122 D4); empty string when unavailable.
output:
  format: json
  must_not_contain:
    - "```"
  schema:
    coverage: '"satisfied" | "gap" | "silent"'
    violation: boolean
    reasoning: string
    finding: string_or_null
success_criteria: >
  Returns valid JSON. `coverage` is the three-way verdict: "satisfied" when the
  document actively covers and meets the requirement; "gap" when it addresses but
  fails the requirement; "silent" when the document does not address the
  requirement at all (silence is absence of evidence, not a gap). `violation` is
  true when and only when coverage is "gap". `reasoning` explains the verdict in
  compliance terms. `finding` states the specific gap (or null when not a gap).
