id: fix_test_prompt
version: "0.1.0"
role: LocalCoder
description: Analyzes a failing test and generates a corrected version of the test code.
input:
  required:
    - test_name
    - failure_type
    - test_code
output:
  format: raw_text
success_criteria: Returns syntactically valid Python test code that addresses the identified failure without changing test intent.
