id: aspect_guidance_extraction
version: "0.1.0"
role: Architect
description: Extracts policy guidance relevant to a specific aspect, citing exact clauses and confidence ratings.
input:
  required:
    - aspect
output:
  format: json
  schema:
    guidance: string
    citation: string
    confidence: number
success_criteria: Returns precise policy guidance with exact clause citations and justified confidence score between 0.0 and 1.0.
