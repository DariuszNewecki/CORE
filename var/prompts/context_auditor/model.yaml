id: context_auditor
version: "1.0.0"
role: Coder
description: >
  Audits a context dossier for completeness before code generation.
  Determines whether the dossier contains enough information to execute
  the stated goal, identifying any missing elements.

input:
  required:
    - goal
    - dossier_summary

output:
  format: json
  must_contain:
    - status
    - missing_elements
    - reasoning
    - confidence_score

success_criteria: >
  Returns valid JSON with status ("READY" or "INCOMPLETE"),
  missing_elements list, reasoning string, and confidence_score float.
