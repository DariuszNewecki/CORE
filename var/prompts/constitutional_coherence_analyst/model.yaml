# var/prompts/constitutional_coherence_analyst/model.yaml
# PromptModel manifest for the ConstitutionalCoherenceAnalyst role.
# Governing ADR: .specs/decisions/ADR-067-constitutional-coherence-checker.md
# Version: 1.0.0

id: prompt.constitutional_coherence_analyst
version: "1.0.0"
role: ConstitutionalCoherenceAnalyst
description: >
  Candidate-finder for constitutional document coherence. Identifies potential
  contradictions, gaps, and drift between ADRs, rule domains, and northstar
  documents. Produces no verdicts. Outputs candidates for human review only.

model:
  preference: local
  temperature: 0.1
  max_tokens: 1024

input:
  required:
    - relation_description
    - documents_text

output:
  # `format: json` maps to OpenAI-compatible `response_format: {"type":
  # "json_object"}` (see PromptModel._build_response_format). We previously
  # had a `json_schema:` block here for grammar-constrained sampling, but
  # DeepSeek's API rejects `response_format: {type: json_schema}` (returns
  # 400 "This response_format type is unavailable now" — 2026-05-22).
  # Without cross-provider json_schema support, shape enforcement falls to:
  #   1. system.txt instructions (output ONLY a JSON array, exact field set)
  #   2. CoherenceChecker._is_valid_candidate shape check per candidate
  # If the model returns a wrapper object instead of an array (the phi4
  # 2026-05-21 failure mode), `_llm_call` raises a clean `llm_parse_failure`
  # rather than silently violating the contract.
  format: json
  max_length: 8000
  must_contain:
    - "["
    - "]"
  must_not_contain:
    - "I recommend"
    - "should be amended"
    # Don't add "```" here — phi4 reliably ignored "no fences" guidance and
    # this check became the failure mechanism on 2026-05-21.

success_criteria: >
  Output is a valid JSON array. Each element has exactly: relation (string,
  one of R1/R2/R3), documents (array of strings), claim (one sentence),
  rationale (2-4 sentences). If no candidates are found, output is [].
  No preamble, no markdown fences, no amendment recommendations.
