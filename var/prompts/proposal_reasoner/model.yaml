id: proposal_reasoner
version: "1.0.0"
role: LocalReasoner
description: >
  Reasons about a group of constitutional audit violations and decides
  whether they are autonomously actionable. Returns a structured JSON
  proposal if actionable.

input:
  required:
    - violations

output:
  format: json
  must_contain:
    - "actionable"

model:
  preference: medium
  temperature: 0.1

success_criteria: >
  Returns valid JSON with keys: actionable (bool), goal (str),
  workflow_type (str), rationale (str).

scope:
  layers:
    - will
