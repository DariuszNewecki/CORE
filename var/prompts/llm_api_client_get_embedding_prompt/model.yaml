id: llm_api_client_get_embedding_prompt
version: "0.1.0"
role: LocalCoder
description: Generates embedding request prompts for the LLM API client with user context and task classification.
input:
  required:
    - prompt
    - user_id
    - task_type
output:
  format: raw_text
success_criteria: Returns a well-formed prompt string suitable for embedding generation that includes the original prompt content, user identification, and task context.
