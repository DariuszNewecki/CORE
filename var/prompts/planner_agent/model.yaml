id: planner_agent
version: "0.1.0"
role: Planner
description: Decompose a high-level goal into a constitutionally-aligned, mutation-only execution plan using available actions, reconnaissance data, and constitutional context.
input:
  required:
    - goal
    - action_descriptions_str
    - reconnaissance_report
output:
  format: json
success_criteria: A valid JSON plan with ordered steps, each specifying an action, parameters, and rationale that collectively achieve the goal without violating constitutional rules.
