id: prompt_artifact_generator
version: "1.0.0"
role: Architect
description: >
  Given an extracted prompt and its context, generate the three PromptModel
  artifact files: model.yaml, system.txt, and user.txt.

input:
  required:
    - suggested_name
    - prompt_text
    - input_vars
    - file_path
    - cognitive_role

output:
  format: json
  must_contain:
    - "model_yaml"
    - "system_txt"
    - "user_txt"

success_criteria: >
  Returns valid JSON containing three keys: model_yaml (a valid YAML string),
  system_txt (a non-empty constitutional system prompt), and user_txt
  (a user template with {placeholder} syntax matching the declared input_vars).
  The generated model.yaml must include id, version, role, input.required,
  output.format, and success_criteria fields.
