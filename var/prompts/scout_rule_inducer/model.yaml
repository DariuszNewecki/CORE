id: scout_rule_inducer
version: "0.2.0"
role: ConstitutionalCoherenceAnalyst
description: >
  Scout rule induction (ADR-119 D3). Reads structural signals extracted from a
  target Python repository and proposes candidate governance rules as observations.
  The LLM proposes what to govern and why; CORE separately maps each observation
  to an enforcement mechanism via the enforcement catalog. Candidates are proposals
  for human ratification — not law until the operator confirms each one (ADR-119 D5).
model:
  temperature: 0.0
input:
  required:
    - code_signals
output:
  format: json
  schema:
    candidates: array
success_criteria: >
  Returns valid JSON with a top-level "candidates" array. Each element has:
  rule_id ("scout.<name>"), statement (MUST/MUST NOT language), enforcement
  ("blocking"|"reporting"|"advisory"), rationale (one to three sentences from
  observed evidence), evidence_sample (optional), ramp_note (optional — non-empty
  when blocking would halt CI due to widespread violations). At most 6 candidates.
  Do not propose rules for patterns the code does not exhibit. No engine, params,
  or scope fields — CORE's enforcement catalog handles that mapping.
  Prefer "reporting" over "blocking" when violations are widespread.
