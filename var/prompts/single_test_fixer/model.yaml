id: single_test_fixer
version: "1.0.0"
role: Coder
description: >
  Fixes a single failing test. Given the test name, failure type, and
  test code, returns a corrected version of the test function.

input:
  required:
    - test_name
    - failure_type
    - test_code

output:
  format: raw_text

adr_anchor: "ADR-134:D8"

success_criteria: >
  Returns the corrected test function code.
