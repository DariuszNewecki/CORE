id: context_auditor_agent
version: "0.1.0"
role: LocalCoder
description: Audits dossier content to verify all necessary code context is present before task execution.

input:
  required:
    - dossier_summary

output:
  format: json
  schema:
    status:
      type: string
      enum: [READY, INCOMPLETE]
    missing_elements:
      type: array
      items:
        type: string
    reasoning:
      type: string
    confidence_score:
      type: number
      minimum: 0.0
      maximum: 1.0

success_criteria: Returns valid JSON indicating whether the dossier contains sufficient context for task execution, with specific missing elements identified if incomplete.
