site_name: CORE Documentation
site_description: Constitutional, self-governing AI development framework.
repo_name: DariuszNewecki/CORE
repo_url: https://github.com/DariuszNewecki/CORE

theme:
      name: material
      language: en
      features:
            - navigation.tabs # top-level items as tabs at the top
            - navigation.top # back-to-top button
            - toc.integrate # put headings inside the page, not in a sidebar

extra_css:
      - css/no-sidebars.css # our custom override

plugins:
      - search:
              lang: en
              separator: '[\s\-\.]+'

nav:
      - Home: index.md
      - How It Works: how-it-works.md
      - Autonomy Ladder: autonomy-ladder.md
      - Getting Started: getting-started.md
      - CLI Reference: cli-reference.md
      - Contributing: contributing.md

markdown_extensions:
      - admonition
      - tables
      - footnotes
      - def_list
      - attr_list
      - pymdownx.highlight
      - pymdownx.details
      - pymdownx.tabbed:
              alternate_style: true
      - pymdownx.emoji:
              emoji_generator:
                    !!python/name:materialx.emoji.to_svg # Critical: Enables Mermaid diagram rendering for architecture docs

      - pymdownx.superfences:
              custom_fences:
                    - name: mermaid
                      class: mermaid
                      format: !!python/name:pymdownx.superfences.fence_code_format
